# Providers — hosted gateways. Shared reference entities, referenced by id from
# per-family gateway access-paths (via-provider: provider-…). Public + generic.

- id: provider-bedrock-mantle
  kind: provider
  name: Amazon Bedrock Mantle
  summary: OpenAI-spec endpoint fronting many non-GPT models (GLM, Nemotron, …)
  visibility: public
  labels: [gateway, cloud, openai-compat]
  facets:
    api:
      apiSpec: openai-compat
      compatCaveats:
        - Some models may not support every feature of the OpenAI API surface.
  claims:
    - kind: recommendation
      body: >-
        Reported to run agent workloads on cheap models (e.g. z.ai GLM) at ~1/10th
        the cost of first-party Sonnet, with acceptable quality for those tasks.
      provenance:
        asOf: "2026-06-19"
        source: "https://substack.com/@conceptualplanner/note/c-277895469"
        confidence: low

# ── first-party providers (vendor's own API; proprietary models only here) ───
- id: provider-anthropic
  kind: provider
  name: Anthropic API
  summary: First-party API for Claude models (proprietary)
  visibility: public
  labels: [first-party, anthropic]
  facets:
    api: { apiSpec: anthropic-native, type: first-party }

- id: provider-openai
  kind: provider
  name: OpenAI API
  summary: First-party API for GPT / o-series models (proprietary)
  visibility: public
  labels: [first-party, openai]
  facets:
    api: { apiSpec: openai-native, type: first-party }

- id: provider-google
  kind: provider
  name: Google AI / Gemini API
  summary: First-party API for Gemini (proprietary) + Gemma (open)
  visibility: public
  labels: [first-party, google]
  facets:
    api: { apiSpec: google-native, type: first-party }

- id: provider-zai
  kind: provider
  name: z.ai API
  summary: First-party API for GLM models (also open-weights on HF)
  visibility: public
  labels: [first-party, zai, openai-compat]
  facets:
    api: { apiSpec: openai-compat, type: first-party }

- id: provider-deepseek
  kind: provider
  name: DeepSeek API
  summary: First-party API for DeepSeek models (also open-weights)
  visibility: public
  labels: [first-party, deepseek, openai-compat]
  facets:
    api: { apiSpec: openai-compat, type: first-party }

# ── aggregator / proxy (fronts MANY models from MANY upstreams via one API) ──
- id: provider-openrouter
  kind: provider
  name: OpenRouter
  summary: Aggregator proxying many models from many upstreams via one OpenAI-compatible API
  visibility: public
  labels: [aggregator, gateway, openai-compat]
  facets:
    api:
      apiSpec: openai-compat
      type: aggregator
      endpoint: "https://openrouter.ai/api/v1"
  claims:
    - kind: note
      body: >-
        Routes each model to one or more upstream sub-providers; the SAME model
        may carry multiple price/latency tiers (e.g. :free, :nitro, by upstream).
        Prices change frequently — sync from the /models endpoint, don't pin.
      provenance:
        asOf: "2026-06-19"
        source: "https://openrouter.ai/api/v1/models"
        verification: authoritative

# ── GPU rental marketplace (prices hardware by the hour, NOT tokens) ─────────
- id: provider-vast-ai
  kind: provider
  name: Vast.ai
  summary: GPU rental marketplace (per-second billing) — sells GPU-hours, not tokens; substrate for self-host endpoints
  visibility: public
  labels: [rental, marketplace, gpu, substrate]
  facets:
    api: { type: gpu-marketplace }

# ── cloud serverless-inference gateway (per-token, fronts open + closed) ──────
- id: provider-digitalocean
  kind: provider
  name: DigitalOcean Inference
  summary: Serverless pay-per-token inference fronting many upstreams (Anthropic, OpenAI, DeepSeek, MiniMax, Qwen, Llama, Mistral, Moonshot, Arcee, fal)
  visibility: public
  labels: [gateway, cloud, serverless, openai-compat]
  facets:
    api:
      apiSpec: openai-compat
      type: gateway
      anthropicCompat: true # Claude models also reachable anthropic-native
  claims:
    - kind: note
      body: >-
        Per-token prices are AT 2026-06-18 — re-check the pricing page (volatile).
        Billing extras: Batch Inference up to 50% off OpenAI/Anthropic models;
        Web Search $10/1k requests + Web Fetch $3/1k (both FREE with Anthropic
        models); some hosted models carry a 30% off-peak discount 05:00-11:00 UTC.
      provenance: &do-pricing
        asOf: "2026-06-18"
        source: "https://docs.digitalocean.com/products/inference/details/pricing/"
        verification: authoritative
    - kind: note
      body: >-
        Only DO-hosted models that already exist as catalog entries get priced
        access-paths (DeepSeek-V4-Flash, MiniMax-M2.5). DO ALSO fronts (not
        modelled — no catalog entry): Anthropic Claude (Opus 4.8 $5/$25, Sonnet
        4.6 $3/$15 ≤200K tiered, Haiku 4.5 $1/$5), OpenAI (GPT-5.5 $5/$30, GPT-5.4
        $2.5/$15, GPT-5.4-mini $0.75/$4.5, GPT-4o $2.5/$10, o1 $15/$60), Arcee
        Trinity-Large $0.25/$0.90, Alibaba Qwen3-32B $0.25/$0.55, Meta Llama-3.3-70B
        $0.65/$0.65, Mistral Ministral-3-14B $0.20/$0.20, Moonshot Kimi-K2.5
        $0.50/$2.70 (off-peak $0.35/$1.89), and fal media models (per-second/
        per-megapixel/per-1k-chars).
      provenance: *do-pricing
