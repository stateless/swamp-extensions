# Runtimes — self-host inference engines. Shared reference entities, referenced
# by id from the per-family access-paths (served-by: runtime-…). Small, slow-moving.
# All entries here are public + generic (no fleet specifics).

- id: runtime-llamacpp
  kind: runtime
  name: llama.cpp
  summary: Widely-used self-host GGUF inference engine (llama-server)
  visibility: public
  labels: [self-host, gguf]
  facets:
    formats: [gguf] # the weight container this runtime loads — used to check artifact compat
  claims:
    - kind: note
      body: >-
        Thinking control: `--reasoning-budget 0` suppresses reasoning, `-1` =
        unlimited. With thinking enabled the server splits reasoning into
        `choices[0].message.reasoning_content` (not `content`) — clients must
        read both; `content` can be empty on complex prompts.
      provenance:
        asOf: "2026-04-17"
        source: "llama.cpp server /v1/chat behaviour (observed)"
        confidence: high

- id: runtime-vllm
  kind: runtime
  name: vLLM
  summary: High-throughput serving engine; tensor/pipeline parallel, FP8 KV, spec decoding
  visibility: public
  labels: [self-host, serving, gpu, production]
  facets:
    formats: [safetensors] # vLLM/transformers/SGLang ecosystem loads safetensors (incl. FP8)
  claims:
    - kind: note
      body: >-
        Supports tensor-parallel + multi-node, MTP speculative decoding, FP8 KV
        cache, prefix caching. Preferred over llama.cpp for production throughput
        and multi-GPU/cluster; the published DGX Spark recipes (forum 365639,
        372268) are vLLM-based.
      provenance:
        asOf: "2026-06-19"
        source: "NVIDIA forum recipes 365639 / 372268"
        verification: cited

- id: runtime-ollama
  kind: runtime
  name: Ollama
  summary: Self-host engine with a model hub and templated GGUFs
  visibility: public
  labels: [self-host]
  facets:
    formats: [gguf]
  claims:
    - kind: caveat
      body: >-
        `num_predict` does not cap thinking tokens, so thinking models can hang
        indefinitely with `stream:false`. Prefer llama.cpp `--reasoning-budget`
        for reliable think/nothink control on reasoning models.
      provenance:
        asOf: "2026-04-13"
        source: "observed across qwen3 thinking models"
        confidence: high

- id: runtime-dwarfstar
  kind: runtime
  name: DwarfStar (ds4)
  summary: Model-coupled self-host engine for DeepSeek-V4 Flash/PRO; Metal/CUDA/ROCm
  visibility: public
  labels: [self-host, gguf, model-coupled, deepseek, apple-silicon, cuda, rocm]
  facets:
    formats: [gguf] # loads ONLY antirez-packaged DeepSeek-V4 GGUF layouts — see caveat
    platform: [apple-silicon, cuda, rocm] # Mac, DGX Spark (CUDA), Strix Halo (ROCm)
    api: { apiSpec: openai-compat, anthropicCompat: true } # OpenAI + Anthropic-compatible REST
    # Novel capabilities the catalog has no shared technique vocabulary for yet —
    # captured here as runtime capabilities rather than per-access-path techniques.
    capabilities:
      ssdExpertStreaming: true   # routed-expert cache on SSD → technique-ssd-expert-streaming
      diskKvSessionCache: true   # ~/.ds4/kvcache, <sha1>.kv = prefix cache persisted to disk
      exactToolReplay: true      # tool-id → exact sampled DSML bytes; avoids KV checkpoint drift
      steering: true             # directional steering for behaviour modification
      mtpSpecDecode: true        # MTP speculative decoding
      distributed: true          # multi-machine inference
  claims:
    - kind: caveat
      body: >-
        Model-coupled and NOT a generic GGUF runner: loads only antirez-packaged
        DeepSeek-V4 layouts from huggingface.co/antirez/deepseek-v4-gguf (the
        `facets.formats: [gguf]` here is the container, not loadability of generic
        GGUFs). PRO GGUF production still depends on the external llama.cpp-based
        workflow; native conversion tooling "can be added later".
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/antirez/ds4 (README)"
        confidence: low
    - kind: note
      body: >-
        Notable harness ideas distinct from llama.cpp/vLLM: SSD streaming of
        routed MoE experts (RAM budget caps resident experts), on-disk `.kv`
        session cache keyed by SHA1 of the rendered byte prefix (`/save` `/list`
        `/switch` `/del`), and exact-DSML tool-call replay for stateless API
        sessions (server maps an unguessable tool id → the exact sampled DSML
        block so re-rendered prompts stay byte-identical and the KV checkpoint
        never misaligns). Also: MTP spec-decode, directional steering, distributed
        inference, OpenAI/Anthropic-compatible REST.
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/antirez/ds4 (README)"
        verification: cited
    - kind: caveat
      body: >-
        Beta, GPT-5.5-assisted, "exists only for a few days"; antirez notes the
        target model family may change as the landscape evolves. Treat all ds4
        entries as low-confidence and fast-decaying — re-verify against the repo.
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/antirez/ds4 (README)"
        confidence: low

- id: runtime-mlx-lm
  kind: runtime
  name: mlx-lm
  summary: Apple-Silicon inference engine built on the MLX framework; loads MLX-format weights
  visibility: public
  labels: [self-host, apple-silicon, mlx, engine]
  facets:
    formats: [mlx]
    platform: apple-silicon # built on the MLX framework (Apple's CUDA/ROCm peer); M-series only
  claims:
    - kind: note
      body: >-
        mlx-lm is the ENGINE (the `pip install mlx-lm` package, with an
        OpenAI-compatible `mlx_lm.server`); "MLX" itself is Apple's acceleration
        FRAMEWORK (peer of CUDA/ROCm), and `mlx` is the weight FORMAT. The format
        is a third ecosystem alongside GGUF (llama.cpp/ollama) and safetensors
        (vLLM/SGLang): it runs only via mlx-lm / LM Studio on Apple Silicon, so
        choosing it constrains both the engine AND the hardware. NOT "metal" —
        Metal is the generic GPU API beneath everything Apple.
      provenance:
        asOf: "2026-06-19"
        source: "mlx-lm / Apple MLX"
        verification: cited

# A DISTRIBUTION of an engine — a packaged/containerised build of vLLM for GB10,
# NOT a new engine and NOT a technique. Access-paths reference it via `built-with`
# (the composition — model×engine×hw — stays the access-path). distribution-of
# links it to the engine it ships, the way models use variant-of/finetune-of.
- id: runtime-spark-vllm-docker
  kind: runtime
  name: spark-vllm-docker (eugr)
  summary: Containerised vLLM build + cluster orchestration for DGX Spark (GB10)
  visibility: public
  labels: [distribution, docker, vllm, gb10, spark, cluster]
  relations:
    - { rel: distribution-of, target: runtime-vllm } # ships the vLLM engine, packaged for GB10
  facets:
    formats: [safetensors] # inherits the vLLM engine's loadable formats
    platform: [cuda] # GB10 (arch 12.1a)
    build:
      repo: https://github.com/eugr/spark-vllm-docker
      baseImage: "nvidia/cuda:13.0.2-devel-ubuntu24.04"
      arch: "12.1a" # GB10
      registryImage: null # no published image — locally built (default tag `vllm-node`)
      orchestrator: "launch-cluster.sh (Ray + PyTorch-distributed; --solo for single node)"
      supports: [fp8, int4-autoround, awq, nvfp4]
  claims:
    - kind: note
      body: >-
        Reproducible vLLM-on-GB10 distribution: base nvidia/cuda
        13.0.2-devel-ubuntu24.04 (arch 12.1a), FlashInfer + fastsafetensors +
        InstantTensor loading, a "mods" system for model-specific patches without
        rebuild, non-privileged container w/ RDMA, prebuilt vLLM/FlashInfer
        wheels. `./launch-cluster.sh [--solo] exec vllm serve <model> …`;
        multi-node auto-discovery over IB/RDMA (NCCL). Ships recipes for Qwen3.5/
        3.6, GLM-4.7, Gemma4, Nemotron, MiniMax-M2, gpt-oss, Step. No registry
        image — built locally via build-and-copy.sh (tag `vllm-node`). An
        alternative to the forum's aidendle94/sparkrun-vllm image. The engine is
        vLLM (served-by); this entry is the packaged build (built-with).
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker (README)"
        verification: cited

- id: runtime-atlas
  kind: runtime
  name: Atlas (Avarok)
  summary: Pure-Rust DGX-Spark-only inference engine; per-(hardware×model×quant) CUDA kernels; OpenAI-compat
  visibility: public
  labels: [self-host, rust, dgx-spark, gb10, cuda, openai-compat]
  facets:
    formats: [safetensors] # serves HF model ids directly; speed from per-model×quant kernels
    platform: [cuda] # GB10/SM121 ONLY (Spark); ROCm/Metal/Intel planned
    api: { apiSpec: openai-compat } # /v1/chat/completions; OpenAI SDK / Open WebUI / Cline / Claude Code
    license: "AGPLv3 (community) / commercial (enterprise)"
    capabilities:
      perModelQuantKernels: true # 35+ hand-optimised CUDA kernels, hardware×model×quant-specific (not generic)
      mtpSpecDecode: true        # MTP K=2 on supported models
      prefixCaching: true
      fp8KvAutoPromote: true     # FP8 KV + auto-promoted boundary layers
      coldStart: "~2min"
  claims:
    - kind: note
      body: >-
        Pure-Rust engine, GB10/SM121 ONLY (single binary; kernels auto-select at
        startup). Docker `avarok/atlas-gb10:latest` → `serve <hf-model-id> --port`.
        ~12 supported models — speed comes from per-(hardware×model×quant) kernels,
        so the trade is NARROW model coverage (not a generic loader; a model needs a
        built kernel). AGPLv3 / commercial dual-license. ~100 commits, no version pin.
      provenance:
        asOf: "2026-06-23"
        source: "https://github.com/Avarok-Cybersecurity/atlas + forum 369263"
        verification: cited
    - kind: caveat
      body: >-
        Quant rationale (ADR-0004, Accepted 2026-04-17): NVFP4 + FP8 block-scaled
        are the ONLY primary formats (AWQ/GPTQ/W4A16/MX4 out of scope). NVFP4 = half
        FP8's footprint at production quality WHEN CALIBRATED — but two caveats the
        speed numbers hide: (1) GB10 lacks native E2M1 conversion → SOFTWARE FALLBACK
        (a perf tax on the NVFP4 path); (2) NVFP4 calibration quality depends on the
        checkpoint publisher, detectable only by testing. Per-(model×quant) kernel
        trees mean complexity grows ~quadratically → this is WHY the supported set is
        ~12 (the endpoint's serves:listed). Atlas publishes design rationale as ADRs
        (docs/adr/) — a durable provenance source for each recipe's config choices.
      provenance:
        asOf: "2026-06-23"
        source: "https://github.com/Avarok-Cybersecurity/atlas/blob/main/docs/adr/0004-nvfp4-fp8-quantization.md"
        verification: cited
