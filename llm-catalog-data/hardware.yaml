# Hardware — accelerator/box CLASSES (not owned nodes). Owned fleet machines
# (e.g. a specific owned node) live in the PRIVATE instance and `ref` an inventory
# device; they never appear here. Public + generic.

- id: hardware-dgx-spark
  kind: hardware
  name: DGX Spark (GB10)
  summary: Unified-memory inference box; direct CUDA; clusterable; low power
  visibility: public
  labels: [spark, gb10, cuda]
  relations:
    - rel: prefer-over
      target: hardware-strix-halo
      rationale: Direct NVIDIA CUDA support, easy clustering, ~60-80W draw.
      provenance:
        asOf: "2026-06-19"
        source: "https://www.reddit.com/r/LocalLLM/comments/1u5m6i1/"
        confidence: medium
  facets:
    hardware:
      compute: cuda
      unifiedMemGB: 128
      driverReservedGB: 22 # CUDA driver permanently reserves ~22GB → ~100-106GB usable for model+KV
      powerW: 70
      clusterable: true
  claims:
    - kind: recommendation
      body: >-
        Two units (buy ASUS Ascent GX10 to save cost) can run DeepSeek-v4-Flash
        at 1M context and stay comfortably under USD 10k; ~60-80W per unit.
      provenance:
        asOf: "2026-06-19"
        source: "https://www.reddit.com/r/LocalLLM/comments/1u5m6i1/"
        confidence: medium
    - kind: caveat
      body: >-
        Usable memory < 128GB: the CUDA driver permanently reserves ~22GB, leaving
        ~100-106GB for weights+KV. vLLM `gpu_memory_utilization` 0.85 is the
        validated safe ceiling for a ~110GB-class load (0.90 fails — needs ~109.5GB;
        0.80 silently OOMs at CUDA-graph capture unless
        `VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1`).
      provenance: &spark-runbook
        asOf: "2026-06-20"
        source: "github.com/drewid74/optimized-qwen35-hybrid-v2-runbook-public (builds on Albond, forum 365639) + dgx1 live check"
        verification: cited
    - kind: caveat
      body: >-
        Phase 0 — run HEADLESS. A desktop session (gdm3) holds ~16GB of GPU memory;
        set `multi-user.target` (no display manager) to reclaim it for inference.
        Our dgx1 is already headless (verified 2026-06-20: gdm/lightdm/sddm inactive,
        default target multi-user, only ~0.4GB in use idle).
      provenance: *spark-runbook
    - kind: caveat
      body: >-
        USB-C Power-Delivery firmware WEDGE (seen on ASUS GX10; not DGX Founders):
        after OOM-kills / crash-loops the PD firmware can pin the SM clock at
        611/708MHz (vs 2400-2600), power <15W, with NO throttle reason reported and
        `nvidia-smi -lgc` silently ignored — throughput 30-50% low. Fix = AC cold
        drain (poweroff, unplug brick from wall 90-120s, replug); persistent →
        request ASUS PD firmware >=5.8. Worth a smart-plug for remote drains.
      provenance: *spark-runbook
    - kind: note
      body: >-
        nvidia-smi can't report GB10 unified memory (memory.used/total/reserved =
        N/A, "Not Supported") — use `free`/vLLM's memory profiler / tegrastats
        instead. dgx1 live: NVIDIA GB10, driver 580.159.03, CUDA 13.0, kernel
        6.17.0-1021-nvidia (DGX OS 7).
      provenance: *spark-runbook

- id: hardware-apple-silicon
  kind: hardware
  name: Apple Silicon (unified memory)
  summary: M-series Mac with large unified memory (96/128GB+); MLX/Metal frameworks
  visibility: public
  labels: [apple-silicon, mac, unified-memory]
  facets:
    hardware:
      compute: apple-silicon # the vendor stack (peer of cuda/rocm); NOT "metal" (the generic Apple GPU API)
      unifiedMemGB: 128 # class spans 96–128GB+; the ds4 q2-imatrix path targets 96/128GB
      clusterable: true # ds4 supports distributed inference across machines
  claims:
    - kind: note
      body: >-
        Single-box target for DwarfStar's DeepSeek-V4-Flash q2-imatrix path: a
        96/128GB unified-memory Mac runs V4-Flash locally via Metal, contrasting
        the 2-unit DGX Spark vLLM cluster recipe for the same model.
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/antirez/ds4 (README)"
        confidence: low

