# Hardware — accelerator/box CLASSES (not owned nodes). Owned fleet machines
# (e.g. a specific owned node) live in the PRIVATE instance and `ref` an inventory
# device; they never appear here. Public + generic.

- id: hardware-dgx-spark
  kind: hardware
  name: DGX Spark (GB10)
  summary: Unified-memory inference box; direct CUDA; clusterable; low power
  visibility: public
  labels: [spark, gb10, cuda]
  relations:
    - rel: prefer-over
      target: hardware-strix-halo
      rationale: Direct NVIDIA CUDA support, easy clustering, ~60-80W draw.
      provenance:
        asOf: "2026-06-19"
        source: "https://www.reddit.com/r/LocalLLM/comments/1u5m6i1/"
        confidence: medium
  facets:
    hardware:
      compute: cuda
      unifiedMemGB: 128
      driverReservedGB: 22 # CUDA driver permanently reserves ~22GB → ~100-106GB usable for model+KV
      memBandwidthGBs: 273 # LPDDR5x unified — decode is bandwidth-bound; tok/s ≈ bw ÷ (activeParams × bytes/quant). Roofline aligns with optimised serving: 122B-A10B int4 ≈51, dense-27B int4 ≈19.
      powerW: 70
      clusterable: true
      storage: # internal NVMe — relevant to SSD expert-streaming (technique-ssd-expert-streaming)
        device: "Samsung 4TB NVMe, M.2 2242, PCIe Gen5-class"
        seqReadGBs: 14.9         # fio qd32 peak
        randRead1mQd16GBs: 14.9  # random 1MB reads at depth hit the SAME peak → prefetched expert streaming is NOT disk-bound
        randRead1mQd1GBs: 5.7    # serial (one expert at a time) random 1MB — the penalty appears only WITHOUT prefetch
        randRead4kIops: 1690000  # 1.69M IOPS, ~75µs avg latency — not a bottleneck
        note: >-
          On par with a 4TB M5 Max MacBook Pro SSD (~13.6 GB/s read), NOT slower —
          the "2242 short-stick is I/O-limited" concern did not materialise. For MoE
          expert streaming the lever is QUEUE DEPTH: prefetched (qd16) random reads
          get the full 14.9 GB/s; naive serial (qd1) reads drop to 5.7. A
          single-stream dd test misleads (qd1-bound ~6.8) — measure at depth.
        provenance:
          asOf: "2026-06-27"
          source: "measured on a DGX Spark unit — fio 3.36, --direct=1 (O_DIRECT), 16GB non-sparse file, ext4"
          verification: authoritative
          confidence: high
  claims:
    - kind: recommendation
      body: >-
        Two units (buy ASUS Ascent GX10 to save cost) can run DeepSeek-v4-Flash
        at 1M context and stay comfortably under USD 10k; ~60-80W per unit.
      provenance:
        asOf: "2026-06-19"
        source: "https://www.reddit.com/r/LocalLLM/comments/1u5m6i1/"
        confidence: medium
    - kind: caveat
      body: >-
        Usable memory < 128GB: the CUDA driver permanently reserves ~22GB, leaving
        ~100-106GB for weights+KV. vLLM `gpu_memory_utilization` 0.85 is the
        validated safe ceiling for a ~110GB-class load (0.90 fails — needs ~109.5GB;
        0.80 silently OOMs at CUDA-graph capture unless
        `VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1`).
      provenance: &spark-runbook
        asOf: "2026-06-20"
        source: "github.com/drewid74/optimized-qwen35-hybrid-v2-runbook-public (builds on Albond, forum 365639) + live check on a DGX Spark unit"
        verification: cited
    - kind: caveat
      body: >-
        Phase 0 — run HEADLESS. The desktop + maintenance daemons (GNOME, display
        manager, snap, timers) hold ~10-16GB of UNIFIED memory; on a shared-memory
        box that is KV the model never gets. Set `multi-user.target` to reclaim it.
        MEASURED IMPACT (Entrpi, forum 374328 post 26): going headless took the KV
        pool from ~200k to 417,792 tokens (1.59x) / 26.2 GiB KV at 0.82 GMU on the
        SAME GB10 — the gap was pure desktop overhead. Tooling:
        github.com/Entrpi/dgx-spark-serving-mode (`serving-mode serve` pares the
        desktop, KEEPS ssh/docker/nvidia-persistenced, brings up the model unit,
        lingers across reboot). See technique-headless-serving-mode. Diagnostic:
        "Available KV cache memory" a dozen GiB below a peer's = the desktop is up.
      provenance:
        asOf: "2026-06-29"
        source: "github.com/Entrpi/dgx-spark-serving-mode + forum 374328 post 26 (entrpi); earlier gdm3 ~16GB observation per the drewid74 runbook"
        verification: cited
        confidence: medium
    - kind: caveat
      body: >-
        USB-C Power-Delivery firmware WEDGE (seen on ASUS GX10; not DGX Founders):
        after OOM-kills / crash-loops the PD firmware can pin the SM clock at
        611/708MHz (vs 2400-2600), power <15W, with NO throttle reason reported and
        `nvidia-smi -lgc` silently ignored — throughput 30-50% low. Fix = AC cold
        drain (poweroff, unplug brick from wall 90-120s, replug); persistent →
        request ASUS PD firmware >=5.8. Worth a smart-plug for remote drains.
      provenance: *spark-runbook
    - kind: note
      body: >-
        nvidia-smi can't report GB10 unified memory (memory.used/total/reserved =
        N/A, "Not Supported") — use `free`/vLLM's memory profiler / tegrastats
        instead. Observed on a DGX Spark (GB10): driver 580.159.03, CUDA 13.0,
        DGX OS 7.
      provenance: *spark-runbook

- id: hardware-apple-silicon
  kind: hardware
  name: Apple Silicon (unified memory)
  summary: M-series Mac with large unified memory (96/128GB+); MLX/Metal frameworks
  visibility: public
  labels: [apple-silicon, mac, unified-memory]
  facets:
    hardware:
      compute: apple-silicon # the vendor stack (peer of cuda/rocm); NOT "metal" (the generic Apple GPU API)
      unifiedMemGB: 128 # class spans 96–128GB+; the ds4 q2-imatrix path targets 96/128GB
      clusterable: true # ds4 supports distributed inference across machines
  claims:
    - kind: note
      body: >-
        Single-box target for DwarfStar's DeepSeek-V4-Flash q2-imatrix path: a
        96/128GB unified-memory Mac runs V4-Flash locally via Metal, contrasting
        the 2-unit DGX Spark vLLM cluster recipe for the same model.
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/antirez/ds4 (README)"
        confidence: low
    - kind: finding
      body: >-
        M5 Max (40-core GPU) measured as a strong single-box DECODE engine vs the DGX
        Spark: ~612 GB/s LPDDR memory bandwidth vs GB10's ~275 GB/s drives a decode win
        on dense / lower-context models — Qwen3.5-122B mxfp4 (OptiQuant + TurboQuant
        staggered cache) 49.7 tok/s decode / 1005.7 prefill / 68.7GB; Qwen3.6-27B 35.0
        decode / 778.5 prefill / 15.3GB. The Spark's counter-edge is PREFILL compute
        (kb-measured Spark 27B prefill ~2117 > M5's 778.5) and EXTREME (1M operational)
        context (M5 practical ~80-100K). Conclusion: a heterogeneous M5+Spark split
        (M5 = fast denser-model generation at lower context; Spark = million-token
        orchestrator) beat scaling to 4 Sparks here — "moving past two Sparks is
        diminishing returns".
      provenance:
        asOf: "2026-06-28"
        source: "https://forums.developer.nvidia.com/t/deliberations-on-4-sparks-cluster-advantages/373482 (post 38)"
        verification: cited
        confidence: medium

