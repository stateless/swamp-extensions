# ── access-paths: eugr spark-vllm-docker recipes (DGX Spark / GB10) ───────────
- id: ap-minimax-m2-spark-vllm-awq
  kind: access-path
  name: MiniMax-M2 · vLLM AWQ @ 2× DGX Spark (eugr recipe)
  summary: QuantTrio AWQ 4-bit; cluster-only (TP=2, Ray); 128K context
  visibility: public
  relations:
    - { rel: of-model, target: model-minimax-m2 }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-awq }
    - { rel: uses-technique, target: technique-tensor-parallel }
    - { rel: uses-technique, target: technique-ray-serve }
  facets:
    recipe:
      download: { hfRepo: QuantTrio/MiniMax-M2-AWQ, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
      artifact: { quant: awq, format: safetensors }
      hardware: { units: 2, accel: GB10 } # cluster_only: true
      command: |
        vllm serve QuantTrio/MiniMax-M2-AWQ \
            --port 8000 \
            --host 0.0.0.0 \
            --gpu-memory-utilization 0.8 \
            -tp 2 \
            --distributed-executor-backend ray \
            --max-model-len 128000 \
            --load-format fastsafetensors \
            --enable-auto-tool-choice \
            --tool-call-parser minimax_m2 \
            --reasoning-parser minimax_m2
      serving:
        maxModelLen: 128000
        tensorParallel: 2
        toolCallParser: minimax_m2
        reasoningParser: minimax_m2
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/minimax-m2-awq.yaml"
    outcome:
      context: { tokens: 128000 }
      speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/minimax-m2-awq.yaml"
        verification: cited

