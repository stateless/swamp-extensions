# 4-node FP8 base (NOT a quant) — distinct artifact/scale from the 2× AWQ path.
- id: ap-minimax-m25-spark-vllm-fp8-4x
  kind: access-path
  name: MiniMax-M2.5 · vLLM FP8 @ 4× DGX Spark (eugr 4x-cluster recipe)
  summary: MiniMaxAI FP8 base on a 4-node mesh (TP=4, Ray, SPREAD); 128K context
  visibility: public
  relations:
    - { rel: of-model, target: model-minimax-m25 }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-fp8 }
    - { rel: uses-technique, target: technique-tensor-parallel }
    - { rel: uses-technique, target: technique-ray-serve }
  facets:
    recipe:
      download: { hfRepo: MiniMaxAI/MiniMax-M2.5, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
      artifact: { quant: fp8, format: safetensors } # official FP8 weights
      hardware: { units: 4, accel: GB10 } # 4x-spark-cluster, cluster_only
      env: { VLLM_DISTRIBUTED_EXECUTOR_CONFIG: '{"placement_group_options":{"strategy":"SPREAD"}}' }
      command: |
        vllm serve MiniMaxAI/MiniMax-M2.5 \
            --trust-remote-code \
            --port 8000 \
            --host 0.0.0.0 \
            --gpu-memory-utilization 0.90 \
            -tp 4 \
            --distributed-executor-backend ray \
            --max-model-len 128000 \
            --load-format fastsafetensors \
            --enable-auto-tool-choice \
            --tool-call-parser minimax_m2 \
            --reasoning-parser minimax_m2_append_think
      serving:
        maxModelLen: 128000
        tensorParallel: 4
        toolCallParser: minimax_m2
        reasoningParser: minimax_m2_append_think
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/minimax-m2.5.yaml"
    outcome:
      context: { tokens: 128000 }
      speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/minimax-m2.5.yaml"
        verification: cited

