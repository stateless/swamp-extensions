# MiniMax-M2 family (MiniMax AI). Public + generic. Architecture VERIFIED against
# the canonical MiniMaxAI/* HF config.json (2026-06-20) → authoritative. M2 / M2.5
# / M2.7 share one architecture (model_type minimax_m2: 62 layers, 256 routed
# experts, 8/token, hidden 3072, 196608 native context, vocab 200064, MTP) and
# differ by training generation + published default precision — so one family file
# with per-variant entries. The eugr spark-vllm-docker recipes serve community AWQ
# quants (cyankiwi/QuantTrio) + the MiniMaxAI FP8 base on 2–4× DGX Spark clusters.
#
# NOTE on params: the HF safetensors index reports ~480GB (BF16 base for M2) /
# ~466GB (M2.5 FP8) — total params estimated ~230B / ~10B active (MiniMax-M2 is
# publicly an A10B MoE); exact published counts not stated on the card, so total
# carries verification: cited (architecture shape is authoritative from config).

# ── family umbrella ─────────────────────────────────────────────────────────
- id: model-minimax-m2
  kind: model
  name: MiniMax-M2 (family)
  summary: MiniMax open-weights MoE (minimax_m2); 256-expert/8-active; MTP; 192K context
  visibility: public
  labels: [minimax, moe, open-weights, mtp]
  facets:
    architecture:
      hfRepo: MiniMaxAI/MiniMax-M2
      modelType: minimax_m2
      attention: full-attention # attn_type_list all 1 (full attention, no linear/SWA mix); partial RoPE (rotary_dim 64)
      params: "~230B" # est. from ~480GB BF16 index; MiniMax-M2 publicly ~A10B MoE
      activeParams: "~10B"
      layers: 62
      hidden: 3072
      experts: "8/token of 256 routed" # shared_intermediate_size 0 → no shared expert
      nativeContext: 196608 # max_position_embeddings
      vocab: 200064
      mtp: true # use_mtp true; num_mtp_modules 3
      modality: [text]
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/MiniMaxAI/MiniMax-M2/resolve/main/config.json"
        verification: authoritative
    license:
      name: MiniMax Model License (HF license tag 'other')
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/api/models/MiniMaxAI/MiniMax-M2 (cardData.license=other)"
        verification: cited
  claims:
    - kind: note
      body: >-
        VERIFIED against HF config.json (2026-06-20): model_type minimax_m2, 62
        layers, 256 routed experts, 8 experts/token, hidden 3072, attn_type_list
        all full attention, partial RoPE (rotary_dim 64, rope_theta 5e6), MTP
        (num_mtp_modules 3), 196608 native context, vocab 200064. Total/active
        params (~230B/~10B) estimated from the BF16 safetensors index — re-verify
        against a primary published count.
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/MiniMaxAI/MiniMax-M2/resolve/main/config.json + model.safetensors.index.json"
        verification: cited

# ── variants ────────────────────────────────────────────────────────────────
# M2.5 / M2.7 are later training generations on the SAME architecture (distinct HF
# repos + distinct weights) → own model entries, variant-of the family.
- id: model-minimax-m25
  kind: model
  name: MiniMax-M2.5
  summary: Later-generation MiniMax-M2 (same minimax_m2 arch); distinct weights
  visibility: public
  labels: [minimax, moe]
  relations:
    - { rel: variant-of, target: model-minimax-m2 }
  facets:
    architecture:
      hfRepo: MiniMaxAI/MiniMax-M2.5
      modelType: minimax_m2
      attention: full-attention
      params: "~230B"
      activeParams: "~10B"
      layers: 62
      hidden: 3072
      experts: "8/token of 256 routed"
      nativeContext: 196608
      vocab: 200064
      mtp: true
      modality: [text]
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/MiniMaxAI/MiniMax-M2.5/resolve/main/config.json"
        verification: authoritative
    footprint: # Unsloth-published per-quant memory (weights-only); LARGE — multi-Spark
      basis: weights-only
      quants:
        - { quant: "UD-Q3_K_XL", memGB: 101, note: "Unsloth-recommended balance (3-bit dynamic)" }
        - { quant: Q8, memGB: 243 }
        - { quant: BF16, memGB: 457, note: "original unquantized" }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/tutorials/minimax-m25"
        verification: cited
    benchmarks: # Unsloth-published (attributed to MiniMax vendor figures)
      sweBenchVerified: 80.2
      sweBenchMultilingual: 51.3
      sweBenchPro: 55.4
      browseComp: 76.3
      aime2025: 86.3
      gpqaDiamond: 85.2
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/tutorials/minimax-m25 (Unsloth aggregating MiniMax vendor figures)"
        verification: cited
    config:
      sampling: { temp: 1.0, top_p: 0.95, top_k: 40, min_p: 0.01 } # Unsloth recommendation
      maxContext: 196608
      recommendedQuant: "UD-Q3_K_XL"
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/tutorials/minimax-m25"
        verification: cited

