            tau2BenchTelecom: "0.943 -> 0.942"
            sciCode: "0.481 -> 0.481"
            ifBench: "0.788 -> 0.795" # NVFP4 slightly higher = noise
          provenance:
            asOf: "2026-06-28"
            source: "https://huggingface.co/nvidia/DeepSeek-V4-Flash-NVFP4 model card"
            verification: authoritative
            confidence: medium
        claims:
          - kind: caveat
            body: >-
              NVIDIA-OFFICIAL NVFP4 reference, the quality-reference FP4 point —
              but the published recipe is TP=4 (vLLM) / TP=8 (SGLang) on B200/GB300, which
              EXCEEDS a single GB10's 128GB and is NOT validated on DGX Spark in-card.
              Only MoE-block linear weights+activations are NVFP4 (rest BF16/FP8). Needs a
              Spark-fit config (TP=2 + expert offload) before it's a single/dual-Spark path.
              SIZE NOTE: the HF widget's "167B params" (DSpark shows "165B") is the
              safetensors element counter UNDER-counting FP4-packed tensors (2 FP4/uint8 →
              numel halves for the MoE bulk), NOT true params (284B, same checkpoint) and
              NOT GB on disk (unpublished; ~140-150GB est, cf. canada-quant's 143GB W4A16).
