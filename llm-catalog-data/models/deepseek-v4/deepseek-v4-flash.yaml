# DeepSeek-v4-Flash. Public + generic. Demonstrates a CLUSTER runsOn entry
# (units = 2) and a long-context recipe; competing access-paths embedded as
# facets.runsOn[] keyed by endpoint.

- id: model-deepseek-v4-flash
  kind: model
  name: DeepSeek-v4-Flash
  summary: 284B/13B-active MoE; 1M context (YaRN); MLA + CSA/HCA hybrid attention; MIT
  visibility: public
  labels: [deepseek, long-context, moe, sparse-attention]
  facets:
    aaIntelligence:
      index: 40
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      hfRepo: deepseek-ai/DeepSeek-V4-Flash
      modelType: deepseek_v4
      params: "284B"
      activeParams: "13B"
      layers: 43
      hidden: 4096
      experts: "6/token of 256 routed + 1 shared"
      nativeContext: 65536 # extends to 1048576 (1M) via YaRN factor 16
      extendedContext: 1048576
      attention: "MLA (64 heads, 1 KV head, head_dim 512) + CSA/HCA hybrid; sliding_window 128"
      vocab: 129280
      license: MIT
      modality: [text]
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash config.json + model card"
        verification: authoritative
    footprint: # weights resident (MoE = ALL experts loaded); KV cache + activations extra
      basis: weights-only
      quants:
        - { quant: q2,  memGB: 99,  note: "ds4 q2-imatrix — published to run on a 96/128GB box; consistent" }
        - { quant: q4,  memGB: 160, note: "needs a 512GB-class box" }
        - { quant: fp8, memGB: 284, note: "the 2x DGX Spark (256GB) cluster recipe — relies on expert offload" }
      provenance:
        asOf: "2026-06-20"
        source: "estimated: total params x effective bits/8 (q2~2.8b q4~4.5b fp8~8b); cross-checked vs ds4 fit claims"
        verification: estimated
        confidence: low
    runsOn:
      # ── vLLM @ 2× DGX Spark (1M ctx) — aidendle94 recipe ──────────────────
      # was ap-deepseek-v4-flash-2spark-vllm
      - endpoint: endpoint-vllm-dgx-spark
        name: "vLLM @ 2× DGX Spark (1M ctx) — aidendle94 recipe"
        quant: "FP8 (official)"
        format: safetensors
        techniques: [technique-fp8, technique-prefix-caching, technique-flashattention, technique-tensor-parallel, technique-context-extension]
        units: 2
        download:
          hfRepo: deepseek-ai/DeepSeek-V4-Flash
          revision: null # TODO pin commit/tag for byte-exact re-download
          format: safetensors
          downloadCmd: "hf download deepseek-ai/DeepSeek-V4-Flash --revision <rev>"
        config:
          maxModelLen: 1000000
          tensorParallel: 2
          gpuMemoryUtilization: 0.82
          kvCacheDtype: fp8
          toolCallParser: deepseek_v4
          reasoningParser: deepseek_v4
          tokenizerMode: deepseek_v4
          maxNumSeqs: 6 # max concurrent sequences
          maxNumBatchedTokens: 8192
          blockSize: 256
          env:
            VLLM_USE_B12X_MOE: "1"
            VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
            TORCH_CUDA_ARCH_LIST: "12.1a"
            NCCL_NET: "IB"
          build:
            image: "aidendle94/sparkrun-vllm-ds4-gb10:production-ready"
            version: "0.21.1"
            cuda: "12.1"
        command: >-
          dsv4-vllm-entrypoint serve deepseek-ai/DeepSeek-V4-Flash
          --tensor-parallel-size 2 --pipeline-parallel-size 1 --kv-cache-dtype fp8
          --block-size 256 --max-model-len 1000000 --max-num-seqs 6
          --max-num-batched-tokens 8192 --gpu-memory-utilization 0.82
          --enable-prefix-caching
          --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
          --distributed-executor-backend mp --enable-flashinfer-autotune
          --nnodes 2 --node-rank ${NODE_RANK} --master-addr ${MASTER_ADDR}
        procedure: "https://forums.developer.nvidia.com/t/372268"
        outcome:
          context: { tokens: 1000000 }
          speed:
            genTokS: 39.4
            prefillTokS: 1850 # ~1800-1900 @2048-tok prompt, 2x GB10 — forum 373482 post 38 (separate source from the 372268 decode rows below)
            note: "@240K ctx, single request — see measurements for the conditions; prefill ~1800-1900 @2048 prompt (forum 373482)"
          # A tok/s is only comparable WITH its concurrency + context depth. The
          # spread below is all one config; concurrency ~doubles throughput.
          measurements:
            - { concurrency: 1, contextDepth: 0, decodeTokS: 45.7, ttft: "1s" }
            - { concurrency: 1, contextDepth: 240000, decodeTokS: 39.4 }
            - { concurrency: 1, contextDepth: 512000, decodeTokS: 36.1 }
            - { concurrency: 1, contextDepth: 980000, decodeTokS: 30.4, ttft: "16.6m" }
            - { concurrency: 2, contextDepth: 0, decodeTokS: 54.4 }
            - { concurrency: 4, contextDepth: 0, decodeTokS: 47.8 }
          quality:
            toolEvalBench: "89/100" # depends on the correct deepseek_v4 tool-call parser above
            ifEvalInstruction: 88.2
            ifEvalPrompt: 84.8
          provenance:
            asOf: "2026-06-19"
            source: "https://forums.developer.nvidia.com/t/372268 (aidendle94 / 0rand)"
            verification: cited
            versionPins:
              runtime: vLLM
              version: "0.21.1"
              cuda: "12.1"
              image: "aidendle94/sparkrun-vllm-ds4-gb10:production-ready"
        claims:
          - kind: finding
            body: >-
              PREFILL (forum 373482 post 38, a 2nd 2x-GB10 operator — separate from the
              372268 decode rows): ~1,800-1,900 tok/s prompt-processing at a 2048-token
              prompt, decode 30-50 tok/s (concurrency-dependent), 1M context "battle
              proven", ~70C/158F thermal. Prefill is the Spark's structural edge — vs the
              M5 Max's ~1005 tok/s on Qwen3.5-122B (forum 373482), GB10 prefill compute
              wins even where M5 wins decode. Fills the prefill gap left by the 372268
              recipe (which published decode only).
            provenance:
              asOf: "2026-06-28"
              source: "https://forums.developer.nvidia.com/t/deliberations-on-4-sparks-cluster-advantages/373482 (post 38)"
              verification: cited
              confidence: medium
          - kind: caveat
            body: >-
              Dead ends (per 0rand): FP4-Marlin backend incompatible with FP8 weights;
              manual PR-40082 build hits a FlashInfer/cutlass mismatch; standard
              spark-vllm-docker lacks b12x MoE (2× slower prefill). Requires
              `shm_size: 64gb` + `ulimits memlock=-1` or NCCL "unhandled system error".
              Launch worker node before head (~10s delay).
            provenance:
              asOf: "2026-06-19"
              source: "https://forums.developer.nvidia.com/t/372268 (aidendle94 / 0rand)"
              verification: cited
          - kind: note
            body: >-
              RECONCILIATION: num_speculative_tokens=2 — 0rand says "2 is optimal" vs a
              query about MTP=3 (no comparative metrics given). Replicated by stu.miller
              (35.6 t/s single / 63.9 t/s @c4) and MiaAI_Lab (40-45 t/s) on the same
              image — results agree within the concurrency-dependent band.
            provenance:
              asOf: "2026-06-19"
              source: "https://forums.developer.nvidia.com/t/372268 (aidendle94 / 0rand)"
              verification: cited
      # ── vLLM/SGLang @ DGX Spark — OFFICIAL DeepSeek-V4-Flash-DSpark repo ──
      - endpoint: endpoint-vllm-dgx-spark
        name: "vLLM/SGLang @ DGX Spark — official DeepSeek-V4-Flash-DSpark"
        quant: "FP4 (MoE experts) + FP8 mixed (official)"
        format: safetensors
        techniques: [technique-nvfp4, technique-mxfp4, technique-fp8, technique-mtp, technique-prefix-caching, technique-context-extension]
        units: 1
        download:
          hfRepo: deepseek-ai/DeepSeek-V4-Flash-DSpark
          revision: null # TODO pin commit/tag
          format: safetensors
          downloadCmd: "hf download deepseek-ai/DeepSeek-V4-Flash-DSpark"
        config:
          apiSpec: openai-compat
        command: >-
          vllm serve deepseek-ai/DeepSeek-V4-Flash-DSpark
          # or: python3 -m sglang.launch_server --model-path deepseek-ai/DeepSeek-V4-Flash-DSpark --host 0.0.0.0 --port 30000
          # or: docker model run hf.co/deepseek-ai/DeepSeek-V4-Flash-DSpark
        procedure: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash-DSpark"
        outcome:
          context: { tokens: 1000000 }
          speed: { note: "no tok/s on the card; Think-Max reasoning wants >=384K ctx — measure on target Spark" }
          provenance:
            asOf: "2026-06-28"
            source: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash-DSpark model card + arXiv 2606.19348"
            verification: authoritative
            confidence: medium
        claims:
          - kind: note
            body: >-
              OFFICIAL Spark-tailored variant: "not a new model — the same checkpoint
              with an additional speculative decoding module (DeepSpec) attached" over the
              FP4(MoE)+FP8-mixed base weights, packaged for single-command vLLM / SGLang /
              `docker model run`. Contrast the aidendle94 community 2xSpark recipe
              (ap-deepseek-v4-flash-2spark-vllm) which hand-builds b12x-MoE vLLM and bolts
              on MTP-2 — DSpark ships the spec-decode module IN the repo and runs from one
              line. No published Spark tok/s on the card (gap); same 284B/13B/1M/MIT base.
            provenance:
              asOf: "2026-06-28"
              source: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash-DSpark model card"
              verification: cited
              confidence: medium
      # ── vLLM @ 2x DGX Spark — canada-quant W4A16+FP8 (GPTQ MoE) ──────────
      - endpoint: endpoint-vllm-dgx-spark
        name: "vLLM @ 2x DGX Spark — canada-quant W4A16-FP8"
        quant: "W4A16 INT4 (routed experts, GPTQ g128) + FP8-block attention + BF16 shared/embed/lm_head"
        format: safetensors
        techniques: [technique-gptq, technique-fp8, technique-tensor-parallel]
        units: 2
        download:
          hfRepo: canada-quant/DeepSeek-V4-Flash-W4A16-FP8
          revision: null
          format: safetensors
          downloadCmd: "hf download canada-quant/DeepSeek-V4-Flash-W4A16-FP8"
          packager: canada-quant
        config:
          maxModelLen: 16384 # card default; raises toward 1M with adjusted config
          tensorParallel: 2
          gpuMemoryUtilization: 0.92
          kvCacheDtype: fp8
          blockSize: 256
          maxNumSeqs: 4
          tokenizerMode: deepseek_v4
          toolCallParser: deepseek_v4
          reasoningParser: deepseek_v4
          env:
            VLLM_TRITON_MLA_SPARSE: "1"
            VLLM_TRITON_MLA_SPARSE_HEAD_BLOCK_SIZE: "4"
          build:
            image: "jasl/vllm @ branch ds4-sm120-experimental"
        command: >-
          vllm serve canada-quant/DeepSeek-V4-Flash-W4A16-FP8 --tensor-parallel-size 2
          --kv-cache-dtype fp8 --block-size 256 --max-model-len 16384 --max-num-seqs 4
          --gpu-memory-utilization 0.92 --tokenizer-mode deepseek_v4
          --tool-call-parser deepseek_v4 --enable-auto-tool-choice
          --reasoning-parser deepseek_v4 --trust-remote-code
        procedure: "https://huggingface.co/canada-quant/DeepSeek-V4-Flash-W4A16-FP8"
        outcome:
          context: { tokens: 16384 } # default; up to 1M with config
          measurements:
            - { machine: "2x DGX Spark GB10 (TP=2)", concurrency: 1, decodeTokS: 15.5, note: "14-17 tok/s band, bs=1" }
            - { machine: "2x RTX PRO 6000 (TP=2)", concurrency: 1, decodeTokS: 47.5, note: "TPOT 20.8ms" }
            - { machine: "2x RTX PRO 6000 (TP=2)", concurrency: 2, decodeTokS: 84.0, note: "TPOT 21.7ms; ~420 tok/s aggregate" }
          quality:
            gsm8k: "95.1-95.5% (8-shot)"
            humanEval: "78-80% (pass@1)"
            niah: "4/5 retrieval @256K x2 concurrent (377s)"
          provenance:
            asOf: "2026-06-28"
            source: "https://huggingface.co/canada-quant/DeepSeek-V4-Flash-W4A16-FP8 model card"
            verification: cited
            confidence: medium
        claims:
          - kind: caveat
            body: >-
              ~143GB quantized (~3.8x vs ~543GB BF16); fits 2xSpark (128GB unified ea,
              NVLink-C2C, TP=2). But DGX-Spark decode is only ~14-17 tok/s bs=1 vs ~47-48
              tok/s on 2x RTX PRO 6000 at the SAME quant — a memory-bandwidth gap, not a
              quant gap. NO speculative decode (MTP stripped during GPTQ calibration); the
              -MTP successor repo restores it for ~1.49x. TP>2 blocked by vLLM #41511
              (W4A16 MoE scale-sharding). Needs the jasl/vllm ds4-sm120-experimental
              branch for SM12.x; default max-model-len is only 16384.
            provenance:
              asOf: "2026-06-28"
              source: "https://huggingface.co/canada-quant/DeepSeek-V4-Flash-W4A16-FP8 model card"
              verification: cited
              confidence: medium
      # ── vLLM/SGLang — nvidia NVFP4 (reference; tested B200/GB300, not Spark) ──
      - endpoint: endpoint-vllm-dgx-spark
        name: "vLLM/SGLang — nvidia DeepSeek-V4-Flash-NVFP4 (tested B200/GB300)"
        quant: "NVFP4 (MoE-block linear weights+activations; NVIDIA ModelOpt 0.44.0)"
