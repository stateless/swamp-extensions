      body: >-
        SINGLE-SPARK WEIGHTS-vs-KV BUDGET (why "q2 fits" is misleading): ~106GB
        usable (128 − ~22 CUDA reserve). q2 weights ~99GB all-resident leave only
        ~7GB for KV+activations → context starves to ~tens-of-K. MLA KV ≈ ~24KB/tok
        at fp8 (~3GB@128K, ~6GB@256K, ~24GB@1M). So a GOOD context on ONE box
        requires NOT keeping all experts resident — stream them (resident budget
        ~32–50GB, `--ssd-streaming-cache-experts`) to free ~50GB for KV. The
        decision variable is target CONTEXT LENGTH, not quant: small ctx →
        weights-resident (fastest); large ctx → stream (disk-bound, needs prefetch
        at depth — the GB10 NVMe sustains 14.9 GB/s @ qd16, see
        hardware-dgx-spark.storage). This is what ds4 is built for.
