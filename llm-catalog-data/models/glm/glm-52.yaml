# GLM-5.2 (Zhipu / z.ai). Public + generic.
# Built 2026-06-19 from authoritative sources as a pipeline test:
#   config.json (architecture) + model card (specs/benchmarks/license) +
#   blog/arXiv (DSA/IndexShare narrative). Honest gaps marked; one benchmark
#   carries a flagged source-variance.
# ONE model per file; run-options embedded in facets.runsOn[] keyed by endpoint.

- id: model-glm-52
  kind: model
  name: GLM-5.2
  summary: 753B MoE (glm_moe_dsa); MLA + DSA sparse attention; 1M context; MIT
  visibility: public
  labels: [glm, moe, sparse-attention, long-context, agentic]
  facets:
    aaIntelligence:
      index: 51
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      modelType: glm_moe_dsa # MLA + DSA sparse-attention indexer (DeepSeek-V3.2 style)
      params: "753B"
      layers: 78
      hidden: 6144
      attentionHeads: 64
      experts: "8/token of 256 routed + 1 shared"
      nativeContext: 1048576 # 1M
      vocab: 154880
      modality: [text]
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2 config.json"
        verification: authoritative
    license:
      spdx: MIT
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
    serving:
      tensorTypes: [BF16, F32]
      frameworks: [SGLang, vLLM, Transformers, KTransformers, "Ascend NPU"]
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
    benchmarks:
      hle: 40.5
      aime2026: 99.2
      sweBenchPro: 62.1
      gpqaDiamond: 91.2
      terminalBench21: 82.7
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
        note: >-
          Terminal-Bench 2.1 is 81.0 in the z.ai blog comparison vs 82.7 on the
          model card — source variance flagged, model-card value used.
    runsOn:
      # gateway: OpenRouter (model × provider × cost — real OpenRouter price)
      - endpoint: endpoint-openrouter
        name: "GLM-5.2 · OpenRouter (gateway)"
        providerModelId: "z-ai/glm-5.2"
        cost:
          perMTokInUsd: 1.2
          perMTokOutUsd: 4.1
          provenance:
            asOf: "2026-06-19"
            source: "https://openrouter.ai/api/v1/models"
            verification: authoritative # authoritative AT asOf — price is volatile, re-sync
      # gateway: z.ai first-party (cheaper than the OpenRouter reseller leg)
      - endpoint: endpoint-zai
        name: "GLM-5.2 · z.ai API (gateway)"
        providerModelId: "glm-5.2"
        cost:
          perMTokInUsd: 1.4
          perMTokOutUsd: 4.4
          provenance:
            asOf: "2026-06-22"
            source: "https://docs.z.ai/guides/overview/pricing"
            verification: authoritative # AT asOf — price is volatile, re-sync
      # self-host: 4× GB10 cluster — AWQ-INT4 + data-free 15% expert pruning + MTP
      # (forum 374125, CosmicRaisins). First self-host datapoint for GLM-5.2 on Spark.
      - endpoint: endpoint-vllm-dgx-spark
        name: "GLM-5.2 · b12x AWQ-INT4 (15%-pruned) + MTP @ 4× GB10 cluster (forum 374125)"
        quant: awq-int4
        format: safetensors
        techniques: [technique-awq, technique-mtp, technique-tensor-parallel]
        units: 4 # 4× GB10 (DGX Spark), TP=4 (one GPU/node); 100G MikroTik CRS504 switch; NFS-shared SSD
        download:
          hfRepo: CosmicRaisins/GLM-5.2-AWQ-INT4-15pct
          format: safetensors
          note: >-
            data-free 15% expert pruning of cyankiwi/GLM-5.2-AWQ-INT4 (256→218
            experts/layer; ~636B total / ~40B active). MTP drafter
            CosmicRaisins/GLM-5.2-MTP-INT4-aligned.
        config:
          maxModelLen: 262144 # 256K tested
          tensorParallel: 4
          cudaGraph: FULL # capture-safe ONLY with b12x; otherwise crashes on sm_121
          env: { GLM52_B12X_MLA: "1" } # MLA CUDA-graph capture safety
          build: { runtime: b12x, version: "0.23.0" }
          note: >-
            MTP gave the biggest uplift; CUDA graph ~+3%; prefill lifted 250→~500
            tok/s via b12x (author couldn't exceed 500). Patches at
            github.com/CosmicRaisins/glm-5.2-gb10 (NFS-specific code flagged for removal).
        outcome:
          context: { tokens: 262144, note: "256K tested; ~21→19 tok/s at 64K depth (prelim)" }
          speed:
            genTokS: 21.9 # decode @ 8K depth (llama-benchy 0.3.7, pp2048/tg256)
            note: >-
              decode 20.2 (depth 0) / 21.9 (8K) / 21.2 (32K); prefill 535/517/476
              tok/s; peak ~22 decode / ~500 prefill. Alt
              madeby561/GLM-5.2-NVFP4-REAP-504B was slower (~10 tok/s) + unstable.
          measurements:
            - { contextDepth: 0, decodeTokS: 20.2, prefillTokS: 535 }
            - { contextDepth: 8192, decodeTokS: 21.9, prefillTokS: 517 }
            - { contextDepth: 32768, decodeTokS: 21.2, prefillTokS: 476 }
          provenance:
            asOf: "2026-06-26"
            source: "https://forums.developer.nvidia.com/t/glm-5-2-on-a-4x-gb10-cluster-22-tok-s-decode-256k-ctx-recipe/374125 (CosmicRaisins)"
            verification: cited
            confidence: medium
            versionPins: { runtime: "b12x 0.23.0", quant: awq-int4 }
      # self-host: NVIDIA official NVFP4 — UNPRUNED, near-lossless, datacenter-Blackwell
      # (nvidia/GLM-5.2-NVFP4). The quality-preserving self-host alternative to the
      # 15%-pruned AWQ recipe above: full 753B at 4-bit float, <1pt off the FP8 baseline.
      - endpoint: endpoint-vllm-dgx-spark
        name: "GLM-5.2 · NVIDIA NVFP4 (UNPRUNED, near-lossless) — validated on B200/B300"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-tensor-parallel]
        units: 4 # ~381GB weights (753B × ~0.5B/param) → needs ~512GB (4× GB10) OR 1× B200/B300
        download:
          hfRepo: nvidia/GLM-5.2-NVFP4
          format: safetensors
          note: >-
            NVFP4 via TensorRT Model Optimizer v0.46.0; MoE-expert linear weights+acts
            quantized, SHARED expert left unquantized. Full 753B/40B — NOT pruned. ~381GB.
        config:
          maxModelLen: 1048576 # up to 1M
          kvCacheDtype: fp8_e4m3
          build: { runtime: vllm, version: "0.23.0" } # also SGLang w/ transformers>=5.3.0
          note: >-
            NVIDIA's validated targets are B200/B300 (sm_100). GB10/sm_121 NVFP4 of THIS
            checkpoint is untested here — the units:4 GB10 placement is a footprint-fit
            estimate, not a measured recipe. Confirm the GB10 MoE-NVFP4 backend before relying on it.
        outcome:
          quality:
            # NVFP4 vs the model's own FP8 baseline (NVIDIA model card) — essentially lossless:
            gpqaDiamond: 89.39   # baseline 89.52
            sciCode: 49.04       # baseline 49.85
            ifBench: 75.81       # baseline 74.95 (NVFP4 > baseline)
            aaLcr: 70.13         # baseline 69.38 (NVFP4 > baseline)
            tau2BenchTelecom: 98.25 # baseline 97.9
          provenance:
            asOf: "2026-06-27"
            source: "https://huggingface.co/nvidia/GLM-5.2-NVFP4 (model card)"
            verification: authoritative
            confidence: medium # benchmarks authoritative; GB10 placement is an estimate
            versionPins: { runtime: "vLLM 0.23.0 / SGLang", quant: nvfp4, optimizer: "ModelOpt 0.46.0" }
      # self-host comment datapoint — UNPRUNED on 8× ASUS GB10 (forum 374125, ciprianveg)
      - endpoint: endpoint-vllm-dgx-spark
        name: "GLM-5.2 · UNPRUNED AWQ-INT4 + MTP @ 8× ASUS GB10 (forum 374125 comment)"
        quant: awq-int4
        format: safetensors
        techniques: [technique-awq, technique-mtp, technique-tensor-parallel]
        units: 8 # 8× ASUS GB10
        download: { hfRepo: "zai-org/GLM-5.2 (unpruned, AWQ-INT4)", format: safetensors }
        outcome:
          context: { tokens: 262144 }
          speed: { genTokS: 26.5, note: "26–27 tok/s with MTP across all depths to 256K (unpruned, 8 units)" }
          provenance:
            asOf: "2026-06-26"
            source: "https://forums.developer.nvidia.com/t/glm-5-2-on-a-4x-gb10-cluster-22-tok-s-decode-256k-ctx-recipe/374125 (comment, ciprianveg)"
            verification: cited
            confidence: low
  claims:
    - kind: caveat
      body: >-
        AA-vs-local-quant GAP: the AA Intelligence Index 51 is reference precision
        (full model). Two self-host paths now exist with very different quality:
        (a) the community AWQ-INT4 + data-free 15%-pruning recipe (256→218
        experts/layer) — a real capability cut, NO local eval published, quality
        materially below 51; (b) NVIDIA's official NVFP4 (UNPRUNED, full 753B) —
        near-lossless (<1pt off FP8 on GPQA/SciCode/IFBench/AA-LCR/τ²), so
        reference-class self-host quality IS now achievable WITHOUT the cloud
        gateway — but at ~381GB (≈4× GB10 / 512GB or a B200/B300) and NVIDIA
        validated it on B200/B300, not GB10. Net: prefer NVFP4-unpruned over the
        pruned AWQ recipe for quality; the pruned recipe's only edge is it's a
        proven GB10 cluster path today. Do not read the aaIntelligence facet as the
        pruned-recipe number.
      provenance:
        asOf: "2026-06-27"
        source: "facets.aaIntelligence (reference) vs AWQ-INT4-15%-pruned (forum 374125, no eval) vs nvidia/GLM-5.2-NVFP4 (near-lossless card benchmarks)"
        confidence: medium
    - kind: note
      body: >-
        IndexShare: the DSA sparse-attention indexer is reused across every four
        sparse-attention layers (index_topk 2048), cutting per-token FLOPs ~2.9×
        at 1M context.
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/blog/zai-org/glm-52-blog + arXiv 2602.15763"
        verification: cited
    - kind: note
      body: >-
        Active-parameter count is NOT stated for 5.2. The GLM-5 base scales to
        744B total / 40B active — indicative only, not confirmed for 5.2.
      provenance:
        asOf: "2026-06-19"
        source: "arXiv 2602.15763 (GLM-5, not the 5.2 card)"
        verification: cited
    - kind: note
      body: >-
        Release ~2026-02-17 (inferred from arXiv id 2602.15763); not explicitly
        dated on the model card.
      provenance:
        asOf: "2026-06-19"
        source: "arXiv 2602.15763"
        verification: cited
