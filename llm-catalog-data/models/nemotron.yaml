# NVFP4 access-path: Nemotron-3-Ultra-550B-A55B (4× DGX Spark, TP=4, MTP).
- id: ap-nemotron-ultra-550b-spark-vllm-nvfp4-4x
  kind: access-path
  name: Nemotron-3-Ultra-550B-A55B · vLLM NVFP4 @ 4× DGX Spark (eugr 4x-cluster recipe)
  summary: NVFP4 on a 4-node mesh (TP=4, Ray); Marlin MoE + MTP-4; 256K context
  visibility: public
  relations:
    - { rel: of-model, target: model-nemotron-ultra-550b-a55b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-nvfp4 }
    - { rel: uses-technique, target: technique-mtp }
    - { rel: uses-technique, target: technique-prefix-caching }
    - { rel: uses-technique, target: technique-flashattention }
    - { rel: uses-technique, target: technique-tensor-parallel }
    - { rel: uses-technique, target: technique-ray-serve }
  facets:
    recipe:
      download: { hfRepo: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
      artifact: { quant: nvfp4, format: safetensors, kvCacheDtype: fp8 }
      hardware: { units: 4, accel: GB10 } # 4x-spark-cluster, cluster_only
      env: { VLLM_FLOAT32_MATMUL_PRECISION: high }
      command: |
        vllm serve nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 \
          --tensor-parallel-size 4 \
          --distributed-executor-backend ray \
          --host 0.0.0.0 \
          --port 8000 \
          --dtype auto \
          --max-model-len 262144 \
          --gpu-memory-utilization 0.85 \
          --max-num-seqs 2 \
          --load-format instanttensor \
          --attention-backend TRITON_ATTN \
          --max-num-batched-tokens 16384 \
          --kv-cache-dtype fp8 \
          --moe-backend marlin \
          --mamba-cache-mode align \
          --mamba_ssm_cache_dtype float32 \
          --speculative-config '{"method":"mtp","num_speculative_tokens":4,"moe_backend":"triton","attention_backend":"TRITON_ATTN"}' \
          --enable-prefix-caching \
          --enable-flashinfer-autotune \
          --reasoning-parser nemotron_v3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_xml
      serving:
        maxModelLen: 262144
        tensorParallel: 4
        maxNumSeqs: 2
        maxNumBatchedTokens: 16384
        toolCallParser: qwen3_xml
        reasoningParser: nemotron_v3
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/nemotron-3-ultra-nvfp4.yaml"
    outcome:
      context: { tokens: 262144 }
      speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/nemotron-3-ultra-nvfp4.yaml"
        verification: cited
