  visibility: public
  labels: [nemotron, nano, small, dense]
  relations:
    - { rel: variant-of, target: model-nemotron }
  facets:
    architecture:
      hfRepo: nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16
      params: "4B"
      dense: true # CORRECTED: dense, not MoE (no n_routed_experts in config)
      layers: 42
      hidden: 3136
      attentionHeads: 40
      nativeContext: 262144
      vocab: 131072
      modality: [text]
      provenance:
        asOf: "2026-06-19"
        source: "nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16 config.json"
        verification: authoritative
    footprint:
