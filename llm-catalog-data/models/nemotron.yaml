# NVFP4 access-path: Nemotron-3-Nano-30B-A3B (solo-only — cluster mode fails).
- id: ap-nemotron-nano-30b-spark-vllm-nvfp4
  kind: access-path
  name: Nemotron-3-Nano-30B-A3B · vLLM NVFP4 @ 1× DGX Spark (eugr recipe)
  summary: NVIDIA NVFP4; SINGLE NODE ONLY (cluster fails); CUTLASS MoE; 256K context
  visibility: public
  relations:
    - { rel: of-model, target: model-nemotron-nano-30b-a3b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-nvfp4 }
    - { rel: uses-technique, target: technique-prefix-caching }
  facets:
    recipe:
      download: { hfRepo: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
      artifact: { quant: nvfp4, format: safetensors, kvCacheDtype: fp8 }
      hardware: { units: 1, accel: GB10 } # solo_only: true — cluster mode errors
      mods: [mods/nemotron-nano]
      command: |
        vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4 \
           --moe-backend cutlass \
           --max-model-len 262144 \
           --port 8000 --host 0.0.0.0 \
           --trust-remote-code \
           --enable-auto-tool-choice \
           --tool-call-parser qwen3_coder \
           --reasoning-parser-plugin nano_v3_reasoning_parser.py \
           --reasoning-parser nano_v3 \
           --kv-cache-dtype fp8 \
           --enable-prefix-caching \
           --load-format fastsafetensors \
           --gpu-memory-utilization 0.7
      serving:
        maxModelLen: 262144
        tensorParallel: 1
        toolCallParser: qwen3_coder
        reasoningParser: nano_v3
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/nemotron-3-nano-nvfp4.yaml"
    outcome:
      context: { tokens: 262144 }
      speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/nemotron-3-nano-nvfp4.yaml"
        verification: cited

# NVFP4 access-path: Nemotron-3-Super-120B-A12B (CUTLASS; TP=2 Ray; 256K).
- id: ap-nemotron-super-120b-spark-vllm-nvfp4
  kind: access-path
  name: Nemotron-3-Super-120B-A12B · vLLM NVFP4 @ 2× DGX Spark (eugr recipe)
  summary: NVIDIA NVFP4; CUTLASS MoE + TRITON attention; TP=2 Ray; 256K context
  visibility: public
  relations:
    - { rel: of-model, target: model-nemotron-super-120b-a12b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-nvfp4 }
    - { rel: uses-technique, target: technique-prefix-caching }
    - { rel: uses-technique, target: technique-tensor-parallel }
    - { rel: uses-technique, target: technique-ray-serve }
  facets:
    recipe:
      download: { hfRepo: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
      artifact: { quant: nvfp4, format: safetensors, kvCacheDtype: fp8 }
      hardware: { units: 2, accel: GB10 }
      env: { VLLM_FLASHINFER_ALLREDUCE_BACKEND: trtllm, VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1" }
      command: |
        vllm serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
          --kv-cache-dtype fp8 \
          --moe-backend cutlass \
          --trust-remote-code \
          --gpu-memory-utilization 0.8 \
          --max-model-len 262144 \
          --max-num-seqs 10 \
          --enable-prefix-caching \
          --host 0.0.0.0 \
          --port 8000 \
          --enable-auto-tool-choice \
          --load-format fastsafetensors \
          --tool-call-parser qwen3_coder \
          --reasoning-parser nemotron_v3 \
          --mamba_ssm_cache_dtype float32 \
          --tensor-parallel-size 2 \
          --attention-backend TRITON_ATTN \
          --distributed-executor-backend ray
      serving:
        maxModelLen: 262144
        tensorParallel: 2
        maxNumSeqs: 10
