# ── access-path: Gemma4-26B-A4B online FP8 via vLLM on DGX Spark (eugr recipe) ─
- id: ap-gemma4-26b-spark-vllm-fp8
  kind: access-path
  name: Gemma 4 26B-A4B · vLLM FP8 @ 2× DGX Spark (eugr recipe)
  summary: Online FP8 quant; TP=2 Ray; gemma4 tool/reasoning parsers; 256K context
  visibility: public
  relations:
    - { rel: of-model, target: model-gemma4-26b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-fp8 }
    - { rel: uses-technique, target: technique-prefix-caching }
    - { rel: uses-technique, target: technique-tensor-parallel }
    - { rel: uses-technique, target: technique-ray-serve }
  facets:
    recipe:
      download: { hfRepo: google/gemma-4-26B-A4B-it, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node-tf5)" } # build_args: --tf5
      artifact: { quant: fp8, format: safetensors, kvCacheDtype: fp8 } # online FP8 (--quantization fp8)
      hardware: { units: 2, accel: GB10 } # tensor_parallel 2; solo allowed (cluster_only false) but TP=2 default
      command: |
        vllm serve google/gemma-4-26B-A4B-it \
          --max-model-len 262144 \
          --gpu-memory-utilization 0.8 \
          --port 8000 \
          --host 0.0.0.0 \
          --load-format safetensors \
          --enable-prefix-caching \
          --enable-auto-tool-choice \
          --tool-call-parser gemma4 \
          --reasoning-parser gemma4 \
          --quantization fp8 \
          --kv-cache-dtype fp8 \
          --max-num-batched-tokens 8192 \
          -tp 2 --distributed-executor-backend ray
      serving:
        maxModelLen: 262144
        tensorParallel: 2
        maxNumBatchedTokens: 8192
        toolCallParser: gemma4
        reasoningParser: gemma4
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/gemma4-26b-a4b.yaml"
    outcome:
      context: { tokens: 262144 }
      speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/gemma4-26b-a4b.yaml"
        verification: cited

# ── GGUF self-host access-paths (Unsloth llama.cpp; hardware-agnostic) ─────────
- id: ap-gemma4-26b-gguf-llamacpp
  kind: access-path
  name: Gemma 4 26B-A4B · llama.cpp GGUF (Unsloth)
  summary: Unsloth UD-Q4_K_XL GGUF (~17GB); 262K context; single-Spark-class
  visibility: public
  relations:
    - { rel: of-model, target: model-gemma4-26b }
    - { rel: served-by, target: runtime-llamacpp }
    - { rel: uses-technique, target: technique-gguf-kquant }
    - { rel: uses-technique, target: technique-unsloth-dynamic }
  facets:
    recipe:
      artifact: { quant: "UD-Q4_K_XL", format: gguf, packager: unsloth, hfRepo: "unsloth/gemma-4-26B-A4B-it-GGUF" }
      command: |
        ./llama.cpp/llama-cli -hf unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q4_K_XL \
          --temp 1.0 --top-p 0.95 --top-k 64
      serving: { maxModelLen: 262144 }
      note: "Google default sampling temp 1.0/top_p 0.95/top_k 64. Do NOT run Gemma 4 GGUF on CUDA 13.2 (bad outputs). Disable thinking via llama-server enable_thinking:false."
      procedure: "https://unsloth.ai/docs/models/gemma-4"
    outcome:
      context: { tokens: 262144 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/gemma-4"
        verification: cited

