# Gemma 4 family (Google DeepMind). Public + generic — mined from public primary
# sources (Google model card, HF, Unsloth notes). Our-fleet measurements
# (smoke/T9 scores, GB10 tok/s, GB10 VRAM) are NOT here — they stay private and,
# if shared, become sanitised access-paths with community attribution.
#
# Structure: one family umbrella entry (shared architecture/license/config/
# caveats) + one entry per variant (variant-of → model-gemma4). DRY: shared facts
# live once on the family; variant entries carry only what differs.

# ── family umbrella ─────────────────────────────────────────────────────────
- id: model-gemma4
  kind: model
  name: Gemma 4 (family)
  summary: Google open-weights family; hybrid local-sliding + global attention
  visibility: public
  labels: [gemma, google, open-weights]
  facets:
    architecture:
      attention: hybrid-sliding-global # interleaved local sliding + full global; final layer always global
      notes: "Global layers use unified K/V with Proportional RoPE (p-RoPE) for long-context memory."
      vocab: 262144
    license:
      spdx: apache-2.0
      released: "2026"
      trainingCutoff: "2025-01"
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
    config:
      thinking:
        supported: true
        disable: "--chat-template-kwargs '{\"enable_thinking\":false}'" # gemma4-native (llama.cpp)
        disableGeneric: "--reasoning-budget 0"
      sampling: { temp: 1.0, top_p: 0.95, top_k: 64 } # Google recommendation
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
  claims:
    - kind: caveat
      body: >-
        Do NOT run any Gemma 4 GGUF on the CUDA 13.2 runtime — it produces poor
        outputs. Use a known-good CUDA build.
      provenance:
        asOf: "2026-04-11"
        source: "Unsloth note (via MODEL gemma4 card)"
        verification: cited
        versionPins: { cuda: "13.2-BAD" }
    - kind: note
      body: >-
        Disable thinking reliably with `llama-server` + the gemma4-native
        `enable_thinking:false`; `llama-cli` may not suppress thinking reliably.
        Do not feed prior thinking output back into multi-turn history.
      provenance:
        asOf: "2026-04-17"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4 + llama.cpp"
        verification: cited

# ── variants ────────────────────────────────────────────────────────────────
- id: model-gemma4-e2b
  kind: model
  name: Gemma 4 e2b
  summary: On-device efficiency variant (Per-Layer Embeddings); fastest; small
  visibility: public
  labels: [gemma, efficiency, on-device]
  relations:
    - { rel: variant-of, target: model-gemma4 }
  facets:
    architecture:
      attention: hybrid-sliding-global
      params: "5.1B"
      effectiveParams: "2.3B" # PLE: per-layer embedding tables are lookup-only
      layers: 35
      slidingWindow: 512
      nativeContext: 131072
      modality: [text, image, audio]
      visionEncoderParams: "~150M"
      audioEncoderParams: "~300M"
    footprint: # Unsloth-published per-quant memory (weights-only)
      basis: weights-only
      quants:
        - { quant: "4-bit", memGB: 4 }
        - { quant: "8-bit", memGB: 6.5, note: "5–8GB range; 8-bit recommended for E-series" }
        - { quant: BF16, memGB: 10 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/gemma-4"
        verification: cited
    benchmarks: # Google published, instruction-tuned
      mmluPro: 60.0
      aime2026: 37.5
      liveCodeBenchV6: 44.0
      codeforcesElo: 633
      gpqaDiamond: 43.4
      tau2Agentic: 24.5
      bigBenchExtraHard: 21.9
      mmmlu: 67.4
      mrcrV2_128k: 19.1
      mmmuProVision: 44.2
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
  claims:
    - kind: caveat
      body: >-
        128K context + 512-token sliding window are architectural HARD caps
        (PLE on-device design). `--ctx-size` above 131072 is silently clamped
        (HTTP 400 only on inference). Usable ~100K; not for long-context tasks.
      provenance:
        asOf: "2026-04-14"
        source: "GGUF metadata + server clamp log (verified)"
        verification: reproduced

