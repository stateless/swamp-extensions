# Nemotron 3 Ultra 550B-A55B (MoE) — flagship Nemotron-3; 55B active at 550B total;
# nemotron_h hybrid. Served only by the NVFP4 4× DGX Spark cluster recipe (TP=4,
# Ray, Marlin MoE + MTP-4), embedded as the sole facets.runsOn[] entry.
# variant-of → model-nemotron.

- id: model-nemotron-ultra-550b-a55b
  kind: model
  name: Nemotron 3 Ultra 550B-A55B (MoE)
  summary: Flagship Nemotron-3; sparse MoE; 55B active at 550B total; nemotron_h hybrid
  visibility: public
  labels: [nemotron, ultra, moe, flagship]
  relations:
    - { rel: variant-of, target: model-nemotron }
  facets:
    aaIntelligence:
      index: 38
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      hfRepo: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
      params: "550B" # from the repo/recipe name (A55B); config.json not separately fetched
      activeParams: "55B"
      nativeContext: 262144 # family nemotron_h cap; recipe runs 262144
      vocab: 131072
      modality: [text]
      provenance:
        asOf: "2026-06-20"
        source: "nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 (repo/recipe name) + family nemotron_h config"
        verification: cited
        confidence: medium
    benchmarks: # Nemotron 3 Ultra technical report, Table 10 (post-trained, reasoning-first)
      mmluPro: 86.8
      gpqaDiamond: 87.0 # report "GPQA (no tools)" — Diamond not explicit; post-trained
      sweBenchVerified: 70.7
      liveCodeBenchV6: 89.0
      tau2Agentic: 70.9 # TauBench V3 avg (airline 81.5/retail 86.4/telecom 92.9/banking 22.6)
      ifBench: 81.7 # prompt loose
      hle: 26.7 # no-tools (with-tools 37.4)
      provenance:
        asOf: "2026-06-09"
        source: "https://research.nvidia.com/labs/nemotron/files/NVIDIA-Nemotron-3-Ultra-Technical-Report.pdf"
        verification: authoritative
        note: >-
          Table 10 (POST-trained), NOT the base-model Table 2 (which is much lower:
          MMLU-Pro 79.07, GPQA 50.00, 5-shot). Extras: SWE-Bench Multilingual 67.7,
          Terminal-Bench 2.1 56.4, RULER@1M 94.7, MMLU-ProX 83.0. No ifEval, aime,
          bfcl, mmmlu, plain mmlu in the report eval.
    runsOn:
      # self-host: NVFP4 on a 4-node mesh (TP=4, Ray); Marlin MoE + MTP-4; 256K context
      - endpoint: endpoint-vllm-dgx-spark
        name: "Nemotron-3-Ultra-550B-A55B · vLLM NVFP4 @ 4× DGX Spark (eugr 4x-cluster recipe)"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-mtp, technique-prefix-caching, technique-flashattention, technique-tensor-parallel, technique-ray-serve]
        units: 4 # 4x-spark-cluster, cluster_only; recipe.hardware.units 4, accel GB10
        download: { hfRepo: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 4
          maxNumSeqs: 2
          maxNumBatchedTokens: 16384
          toolCallParser: qwen3_xml
          reasoningParser: nemotron_v3
          attentionBackend: TRITON_ATTN
          kvCacheDtype: fp8
          env: { VLLM_FLOAT32_MATMUL_PRECISION: high }
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        command: |
          vllm serve nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 \
            --tensor-parallel-size 4 \
            --distributed-executor-backend ray \
            --host 0.0.0.0 \
            --port 8000 \
            --dtype auto \
            --max-model-len 262144 \
            --gpu-memory-utilization 0.85 \
            --max-num-seqs 2 \
            --load-format instanttensor \
            --attention-backend TRITON_ATTN \
            --max-num-batched-tokens 16384 \
            --kv-cache-dtype fp8 \
            --moe-backend marlin \
            --mamba-cache-mode align \
            --mamba_ssm_cache_dtype float32 \
            --speculative-config '{"method":"mtp","num_speculative_tokens":4,"moe_backend":"triton","attention_backend":"TRITON_ATTN"}' \
            --enable-prefix-caching \
            --enable-flashinfer-autotune \
            --reasoning-parser nemotron_v3 \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_xml
        note: "NVFP4 on a 4-node mesh (TP=4, Ray); Marlin MoE + MTP-4; 256K context."
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/nemotron-3-ultra-nvfp4.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/nemotron-3-ultra-nvfp4.yaml"
            verification: cited
  claims:
    - kind: note
      body: >-
        Params (550B total / 55B active) and 256K context taken from the repo name
        + the nemotron_h family config (Mamba2-Transformer hybrid); the Ultra
        config.json was not independently fetched, so treat layer/expert counts as
        unverified for this variant (architecture inherited from the family).
      provenance:
