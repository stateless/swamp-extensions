# Gemma 4 31B (dense) — largest dense variant; 256K context; strongest Gemma 4
# benchmarks. variant-of → model-gemma4. Run-options embedded in facets.runsOn[].

- id: model-gemma4-31b
  kind: model
  name: Gemma 4 31B (dense)
  summary: Largest dense variant; 256K context; strongest Gemma 4 benchmarks
  visibility: public
  labels: [gemma, dense]
  relations:
    - { rel: variant-of, target: model-gemma4 }
  facets:
    aaIntelligence:
      index: 29
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      attention: hybrid-sliding-global
      params: "30.7B"
      layers: 60
      slidingWindow: 1024
      nativeContext: 262144
      modality: [text, image]
      visionEncoderParams: "~550M"
    footprint: # Unsloth-published per-quant memory (weights-only); fits a single DGX Spark
      basis: weights-only
      quants:
        - { quant: "4-bit", memGB: 18.5, note: "17–20GB range; UD-Q4_K_XL recommended" }
        - { quant: "8-bit", memGB: 36, note: "34–38GB range" }
        - { quant: BF16, memGB: 62 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/gemma-4"
        verification: cited
    benchmarks:
      mmluPro: 85.2
      aime2026: 89.2
      liveCodeBenchV6: 80.0
      codeforcesElo: 2150
      gpqaDiamond: 84.3
      tau2Agentic: 76.9
      hleNoTools: 19.5
      bigBenchExtraHard: 74.4
      mmmlu: 88.4
      mrcrV2_128k: 66.4
      mmmuProVision: 76.9
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
    runsOn:
      # self-host: Unsloth GGUF via llama.cpp (host-agnostic; ~18.5GB)
      # from ap-gemma4-31b-gguf-llamacpp
      - endpoint: endpoint-llamacpp
        name: "Unsloth UD-Q4_K_XL GGUF"
        quant: "UD-Q4_K_XL"
        format: gguf
        techniques: [technique-gguf-kquant, technique-unsloth-dynamic]
        download: { hfRepo: "unsloth/gemma-4-31B-it-GGUF", format: gguf, packager: unsloth }
        config:
          maxModelLen: 262144
        command: |
          ./llama.cpp/llama-cli -hf unsloth/gemma-4-31B-it-GGUF:UD-Q4_K_XL \
            --temp 1.0 --top-p 0.95 --top-k 64
        note: "Google default sampling temp 1.0/top_p 0.95/top_k 64. Do NOT run Gemma 4 GGUF on CUDA 13.2."
        procedure: "https://unsloth.ai/docs/models/gemma-4"
        outcome:
          context: { tokens: 262144 }
          provenance:
            asOf: "2026-06-20"
            source: "https://unsloth.ai/docs/models/gemma-4"
            verification: cited
      # ★ Atlas (pure-Rust DGX-Spark engine) — supported-models target
      - endpoint: endpoint-atlas-dgx-spark
        name: "Gemma 4 31B · Atlas nvfp4 @ DGX Spark"
        quant: nvfp4
        format: safetensors
        units: 1
        config:
          build: { runtime: Atlas, image: "avarok/atlas-gb10:latest" }
        procedure: "https://github.com/Avarok-Cybersecurity/atlas"
        outcome:
          speed:
            unit: repo-claim # Atlas self-reported — re-verify (genai-perf)
            genTokS: 9
            note: "Atlas single-GPU at batch=2; slow — dense 31B is a poor Atlas fit"
          provenance:
            asOf: "2026-06-23"
            source: "https://github.com/Avarok-Cybersecurity/atlas (supported-models table) + https://forums.developer.nvidia.com/t/369263"
            verification: cited
            confidence: medium
            versionPins: { runtime: "Atlas (avarok/atlas-gb10:latest)", quant: nvfp4 }
  claims:
    - kind: finding
      body: >-
        INDEPENDENT single-Spark agentic-coding eval (DanTup/spark-evals; see
        artifacts/benchmarks/spark-evals-dantup-2026-06-28.md): Gemma4-31B Overall 46.5%
        — bfcl 78%, BEST bigcodebench on the board at 72%. Variants: +MTP 46.5%
        (identical score, ~half the wall-time — spec-decode is throughput-neutral on
        quality), QAT w4a16 +MTP 43.8%. Agentic axis (TheAgentCompany) 0%. Top single-Spark
        cluster alongside Qwen3.6-35B-A3B. NOT a knowledge bench.
      provenance:
        asOf: "2026-06-28"
        source: "github.com/DanTup/spark-evals — artifacts/benchmarks/spark-evals-dantup-2026-06-28.md"
        verification: cited
        confidence: low
