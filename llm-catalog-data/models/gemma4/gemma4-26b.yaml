# Gemma 4 26B-A4B (MoE) — sparse MoE; ~4B active inference speed at 26B total;
# 256K context. variant-of → model-gemma4. Run-options embedded in facets.runsOn[].

- id: model-gemma4-26b
  kind: model
  name: Gemma 4 26B-A4B (MoE)
  summary: Sparse MoE; ~4B active inference speed at 26B total; 256K context
  visibility: public
  labels: [gemma, moe]
  relations:
    - { rel: variant-of, target: model-gemma4 }
  facets:
    aaIntelligence:
      index: 26
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      attention: hybrid-sliding-global
      params: "25.2B"
      activeParams: "3.8B"
      layers: 30
      slidingWindow: 1024
      nativeContext: 262144
      experts: "8 active / 128 total" # CORRECTED: HF config has no shared-expert key (was "+ 1 shared")
      modality: [text, image]
      visionEncoderParams: "~550M"
    footprint: # Unsloth-published per-quant memory (weights-only); fits a single DGX Spark
      basis: weights-only
      quants:
        - { quant: "4-bit", memGB: 17, note: "16–18GB range; UD-Q4_K_XL recommended" }
        - { quant: "8-bit", memGB: 29, note: "28–30GB range" }
        - { quant: BF16, memGB: 52 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/gemma-4"
        verification: cited
    benchmarks:
      mmluPro: 82.6
      aime2026: 88.3
      liveCodeBenchV6: 77.1
      codeforcesElo: 1718
      gpqaDiamond: 82.3
      tau2Agentic: 68.2
      hleNoTools: 8.7
      bigBenchExtraHard: 64.8
      mmmlu: 86.3
      mrcrV2_128k: 44.1
      mmmuProVision: 73.8
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
    runsOn:
      # self-host #1: online FP8 via vLLM @ 2× DGX Spark (eugr recipe)
      # from ap-gemma4-26b-spark-vllm-fp8
      - endpoint: endpoint-vllm-dgx-spark
        name: "vLLM FP8 @ 2× DGX Spark (eugr recipe)"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-prefix-caching, technique-tensor-parallel, technique-ray-serve]
        units: 2 # tensor_parallel 2; solo allowed (cluster_only false) but TP=2 default
        download: { hfRepo: google/gemma-4-26B-A4B-it, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.8
          maxNumBatchedTokens: 8192
          toolCallParser: gemma4
          reasoningParser: gemma4
          kvCacheDtype: fp8 # online FP8 (--quantization fp8)
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node-tf5)" } # build_args: --tf5
        command: |
          vllm serve google/gemma-4-26B-A4B-it \
            --max-model-len 262144 \
            --gpu-memory-utilization 0.8 \
            --port 8000 \
            --host 0.0.0.0 \
            --load-format safetensors \
            --enable-prefix-caching \
            --enable-auto-tool-choice \
            --tool-call-parser gemma4 \
            --reasoning-parser gemma4 \
            --quantization fp8 \
            --kv-cache-dtype fp8 \
            --max-num-batched-tokens 8192 \
            -tp 2 --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/gemma4-26b-a4b.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/gemma4-26b-a4b.yaml"
            verification: cited
      # self-host #2: Unsloth GGUF via llama.cpp (host-agnostic; ~17GB)
      # from ap-gemma4-26b-gguf-llamacpp
      - endpoint: endpoint-llamacpp
        name: "Unsloth UD-Q4_K_XL GGUF"
        quant: "UD-Q4_K_XL"
        format: gguf
        techniques: [technique-gguf-kquant, technique-unsloth-dynamic]
        download: { hfRepo: "unsloth/gemma-4-26B-A4B-it-GGUF", format: gguf, packager: unsloth }
        config:
          maxModelLen: 262144
        command: |
          ./llama.cpp/llama-cli -hf unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q4_K_XL \
            --temp 1.0 --top-p 0.95 --top-k 64
        note: "Google default sampling temp 1.0/top_p 0.95/top_k 64. Do NOT run Gemma 4 GGUF on CUDA 13.2 (bad outputs). Disable thinking via llama-server enable_thinking:false."
        procedure: "https://unsloth.ai/docs/models/gemma-4"
        outcome:
          context: { tokens: 262144 }
          provenance:
            asOf: "2026-06-20"
            source: "https://unsloth.ai/docs/models/gemma-4"
            verification: cited
      # ★ Atlas (pure-Rust DGX-Spark engine) — supported-models target
      - endpoint: endpoint-atlas-dgx-spark
        name: "Gemma 4 26B-A4B · Atlas NVFP4A16 @ DGX Spark"
        quant: NVFP4A16
        format: safetensors
        units: 1
        config:
          build: { runtime: Atlas, image: "avarok/atlas-gb10:latest" }
        procedure: "https://github.com/Avarok-Cybersecurity/atlas"
        outcome:
          speed:
            genTokS: 67
            note: "Atlas supported target; single-GPU"
          provenance:
            asOf: "2026-06-23"
            source: "https://github.com/Avarok-Cybersecurity/atlas (supported-models table) + https://forums.developer.nvidia.com/t/369263"
            verification: cited
            confidence: medium
            versionPins: { runtime: "Atlas (avarok/atlas-gb10:latest)", quant: NVFP4A16 }
