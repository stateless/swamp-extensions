# Gemma 4 e4b — on-device efficiency variant (PLE); barrier candidate. Model-only
# (no measured access-paths). variant-of → model-gemma4.

- id: model-gemma4-e4b
  kind: model
  name: Gemma 4 e4b
  summary: On-device efficiency variant; barrier candidate; PLE
  visibility: public
  labels: [gemma, efficiency, on-device]
  relations:
    - { rel: variant-of, target: model-gemma4 }
    - { rel: uses-technique, target: technique-preserve-thinking-template }
  facets:
    aaIntelligence:
      index: 12
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: true
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      attention: hybrid-sliding-global
      params: "8B"
      effectiveParams: "4.5B"
      layers: 42
      slidingWindow: 512
      nativeContext: 131072
      modality: [text, image, audio]
      visionEncoderParams: "~150M"
      audioEncoderParams: "~300M"
    footprint: # Unsloth-published per-quant memory (weights-only)
      basis: weights-only
      quants:
        - { quant: "4-bit", memGB: 5.75, note: "5.5–6GB range" }
        - { quant: "8-bit", memGB: 10.5, note: "9–12GB range" }
        - { quant: BF16, memGB: 16 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/gemma-4"
        verification: cited
    benchmarks:
      mmluPro: 69.4
      aime2026: 42.5
      liveCodeBenchV6: 52.0
      codeforcesElo: 940
      gpqaDiamond: 58.6
      tau2Agentic: 42.2
      bigBenchExtraHard: 33.1
      mmmlu: 76.6
      mrcrV2_128k: 25.4
      mmmuProVision: 52.6
      provenance:
        asOf: "2026-06-19"
        source: "https://ai.google.dev/gemma/docs/core/model_card_4"
        verification: authoritative
    runsOn:
      # self-host: Unsloth GGUF via llama.cpp `llama serve` (host-agnostic, on-device
      # target: 16GB Apple Silicon). "Humble Pi" recipe — no measured tok/s on our fleet.
      - endpoint: endpoint-llamacpp
        name: "Gemma 4 e4b-it · Unsloth GGUF (llama.cpp serve, reasoning-template)"
        quant: "UD-Q4_K_XL"
        format: gguf
        techniques: [technique-gguf-kquant, technique-unsloth-dynamic, technique-preserve-thinking-template]
        download: { hfRepo: "unsloth/gemma-4-E4B-it-GGUF", format: gguf, packager: unsloth, note: "~5.13GB download; 8GB+ VRAM" }
        config:
          maxModelLen: 65536 # recipe runs 64k; e4b hard-caps at 131072
        command: |
          llama serve -hf unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL \
            -c 65536 -fa 1 --jinja \
            --chat-template-file ~/.llama-templates/gemma-e4b-retain.jinja \
            --parallel 1 --cache-ram 0 \
            --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0
        note: >-
          E4B MUST use the custom reasoning template (--chat-template-file) — the
          stock template strips prior thinking and forces full KV recompute each
          turn (see technique-preserve-thinking-template). Template vendored at
          artifacts/templates/gemma4-e4b-retain.jinja (upstream gist in
          provenance.source). `--cache-ram 0` + `--parallel 1` = single slot, no
          cache bloat. -fa 1 = flash attention. Sampling is Google default
          (min-p 0 = off). Do NOT run Gemma 4 GGUF on CUDA 13.2.
        procedure: "https://gist.github.com/joematthews/d02639bcbe0e0c1c404f5d3a64c3c06f"
        outcome:
          context: { tokens: 65536, note: "recipe value; e4b caps at 131072" }
          speed: { note: "reporter ~25 tok/s on M4 Air 16GB, throttling to ~13 on heat-soak (single-source anecdote, not our fleet)" }
          provenance:
            asOf: "2026-06-21"
            source: "https://gist.github.com/joematthews/d02639bcbe0e0c1c404f5d3a64c3c06f (r/PiCodingAgent 1ubhrgf, joematthewsdev)"
            confidence: medium
  claims:
    - kind: caveat
      body: "128K hard cap + 512 sliding window (same PLE limits as e2b)."
      provenance:
        asOf: "2026-04-14"
        source: "GGUF metadata (verified)"
        verification: reproduced
    - kind: caveat
      body: >-
        The chat template that SHIPS with e4b drops prior thinking blocks from
        history every turn, forcing full KV-cache recompute each turn (large
        multi-turn speed regression). Fix: install a custom jinja reasoning
        template that retains prior thinking blocks — reporter measured a
        substantial speedup. See technique-preserve-thinking-template.
      provenance:
        asOf: "2026-06-21"
        source: "https://gist.github.com/joematthews/d02639bcbe0e0c1c404f5d3a64c3c06f (r/PiCodingAgent 1ubhrgf, author joematthewsdev)"
        confidence: medium
