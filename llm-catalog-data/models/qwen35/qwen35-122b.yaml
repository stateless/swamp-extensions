# Qwen3.5-122B-A10B — Larger MoE sibling; same hybrid-deltanet layout; 256K context.
# The single-Spark all-rounder. Run-options (every tested config + gateway) are
# embedded in facets.runsOn[] keyed by endpoint. LINEAGE: a config's LINEAR
# progression (Albond v1 → v2 → …) is carried inside the operating point's
# outcome.speed.progression (not separate entries); CONCURRENT/disagreeing variants
# (a different contributor's cluster result) DO get their own runsOn entry +
# a `replicates:` lineage field (NOT config/units inheritance).

- id: model-qwen35-122b
  kind: model
  name: Qwen3.5-122B-A10B
  summary: Larger MoE sibling; same hybrid-deltanet layout; 256K context
  visibility: public
  labels: [qwen, moe]
  relations:
    - { rel: variant-of, target: model-qwen35 }
  facets:
    aaIntelligence:
      index: 32
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      attention: hybrid-deltanet
      params: "122B"
      activeParams: "10B"
      nativeContext: 262144
      modality: [text, image, video]
    footprint: # weights resident; KV is GMU-dependent (vLLM allocates ~available−weights), NOT tiny at long context
      basis: weights-only
      kvGbPer1k: 0.10 # ≈27GB KV @262K at the RUNNABLE 0.85 GMU (drewid74 runbook); the 39GB@256K figure (post 398) is the 0.90 allocation, but 0.90 FAILS on GB10 — so model the config that actually runs. The ~1-in-4 full-attention layers carry KV despite the DeltaNet majority.
      quants:
        - { quant: int4, memGB: 71, note: "hybrid INT4 experts + FP8 on 144 dense layers ≈ 67-71GB weights (MEASURED: 71 @post398, 67 @drewid74 runbook; pure-INT4 ≈66GB). Single-Spark FIT is generic to INT4; the recipe's value is THROUGHPUT (28→52 tok/s) — see runsOn. At 262K: ~67-71GB weights + ~27GB(0.85)/39GB(0.90) KV; driver reserves ~22GB, so 0.85 GMU is the safe ceiling (0.90 fails)." }
        - { quant: fp8, memGB: 122, note: "full FP8 — needs ~2 units" }
      provenance:
        asOf: "2026-06-20"
        source: "MEASURED — forum 365639 post 398 (71GB+39GB@0.90) + github.com/drewid74/optimized-qwen35-hybrid-v2-runbook-public (67GB+27GB@0.85); fp8 estimated"
        verification: cited
        confidence: medium
    benchmarks:
      mmluPro: 86.7
      gpqaDiamond: 86.6
      ifEval: 93.4
      ifBench: 76.1
      sweBenchVerified: 72.0
      liveCodeBenchV6: 78.9
      tau2Agentic: 79.5
      bfcl: 72.2 # BFCL V4 overall (Qwen HF card; corroborated llm-stats.com 0.722)
      mmmlu: 86.7
      provenance:
        asOf: "2026-06-19"
        source: "https://qwen.ai/blog?id=qwen3.5"
        verification: cited
        note: "bfcl (BFCL V4 overall) from huggingface.co/Qwen/Qwen3.5-122B-A10B card; rest from the blog."

    # ── run-options: every tested config + gateway, keyed by endpoint ──────────
    runsOn:
      # Atlas (pure-Rust engine) — Recipe C, "large model on single Spark" (fit over speed)
      - endpoint: endpoint-atlas-dgx-spark
        name: "Qwen3.5-122B-A10B · Atlas NVFP4 (Recipe C) @ 1× DGX Spark"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4]
        units: 1
        config:
          maxModelLen: 16384 # 16K — no speculative (memory); 4-way concurrent serve
          concurrentServe: 4
          build: { runtime: Atlas, image: "avarok/atlas-gb10:latest" }
        procedure: "https://github.com/Avarok-Cybersecurity/atlas"
        outcome:
          context: { tokens: 16384 }
          speed: { genTokS: 32, note: "Atlas Recipe C, single-GPU NVFP4, 16K ctx, no spec-decode (fits over speed) — comparable to other single-Spark 122B paths (cf. Albond AR-INT4 51-52 with the full opt stack)" }
          provenance:
            asOf: "2026-06-23"
            source: "https://github.com/Avarok-Cybersecurity/atlas (Recipe C)"
            verification: cited
            confidence: medium
            versionPins: { runtime: "Atlas (avarok/atlas-gb10:latest)", quant: nvfp4 }
      # self-host, endpoint-vllm-dgx-spark — config #1: Albond v2.4 (current best, forum 365639)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.5-122B · vLLM @ 1× Spark — forum 365639 v2.4 (current best)"
        quant: "hybrid INT4 (AutoRound) + FP8 (Qwen official, 144 shared-expert dense layers)"
        format: safetensors
        techniques: [technique-autoround, technique-fp8, technique-int8-lmhead, technique-mtp, technique-flashattention]
        units: 1
        config:
          gpuMemoryUtilization: 0.85
          attentionBackend: FLASHINFER
          maxModelLen: 262144
          reasoningParser: qwen3
          env: # GB10-mandatory (drewid74 runbook); without the first two, FlashInfer JIT OOM-kills the engine
            MAX_JOBS: "2"                                 # throttle FlashInfer JIT (else 20-32 cicc procs exhaust unified mem)
            FLASHINFER_NVCC_THREADS: "1"
            VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1" # estimate (not capture) graph mem — fixes silent OOM at low GMU
            VLLM_MARLIN_USE_ATOMIC_ADD: "1"               # ~+5-7 tok/s
            PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
            VLLM_USE_FLASHINFER_SAMPLER: "0"
          build: { image: "eugr/spark-vllm-docker (local build, tag vllm-node); also drewid74 docker runbook (cu130, torch 2.12.0)" }
        procedure: "https://forums.developer.nvidia.com/t/365639 + production runbook github.com/drewid74/optimized-qwen35-hybrid-v2-runbook-public + Albond's canonical recipe repo github.com/albond/DGX_Spark_Qwen3.5-122B-A10B-AR-INT4 (Intel AutoRound INT4, single Spark, vLLM 0.19.1 2a69949bd, image vllm-qwen35-v2, FlashInfer + hybrid INT4+FP8 + MTP-2 + INT8 LM head, 51-52 tok/s)"
        outcome:
          speed:
            genTokS: 52 # v2.4 FINAL, single-request, short prompt — post 398 (avg 51.6±0.3, peak 54.9)
            genTokS32k: 48 # single-request at 32K filled context — post 72/396
            progression: # all single-Spark, single-request, short prompts, warm — measured (forum 365639)
              - { config: "AutoRound INT4 (v1)", tokS: 28.3 }
              - { config: "+ FP8 shared-expert layers + MTP-1 (Albond v2)", tokS: 38.4 }
              - { config: "+ INT8 LM head (shared-weight Triton GEMV)", tokS: 44, gain: "+15%", post: 71 }
              - { config: "+ MTP-2 (num_speculative_tokens:2)", tokS: 51, gain: "+33% vs 38.4", post: 71 }
              - { config: "+ v2.4 backports (triton.autotune +1.2%; PR#38325 swapAB FP8 GEMM +0.76%)", tokS: 52, note: "FINAL — avg 51.6±0.3, peak 54.9", post: 398 }
            concurrency:
              - { n: 8, aggregateTokS: 79.9, note: "MTP-2 loaded, single node — post 435" }
            range: "36.3-39.9 across Q&A/code/JSON/math/long-code (measured at the 38.4 config)"
            note: "Single-request, SHORT prompt (~30-50 tok); decays with depth — ~48 @32K (post 72/396). Decode tok/s, MTP-accounted; vLLM ~2.3x faster than Ollama."
          quality:
            measured: null # INT4-weights quality still uncertified — but the thread now HAS signal, not zero-data
            note: >-
              Attempted, inconclusive. (a) The hybrid-FP8 step is quality-neutral vs
              pure INT4 (author-verified, post 6) — but that's hybrid-vs-INT4, NOT
              INT4-vs-full-precision. (b) MTP / INT8-head are lossless/near-lossless
              (post 70). (c) A real eval (tool-eval-bench) scored 60-87/100 across
              same-config repeats — too noisy at N=15 to differentiate (post 435).
              So INT4-weights quality is still UNCERTIFIED, but no longer no-data.
            verification: unverified
          provenance:
            asOf: "2026-06-20"
            source: "https://forums.developer.nvidia.com/t/365639 (Albond; v2.4 final post 398)"
            verification: cited
            versionPins:
              vllm: "0.19.1 (commit 2a69949bd) — PINNED; 0.20.1 regresses ~9% (see caveat)"
              image: "eugr/spark-vllm-docker (local build, tag vllm-node); also drewid74 docker runbook (cu130, torch 2.12.0)"
              patch: "~95-line vLLM INC quant patch + v2.4 backports via install.sh (triton.autotune on the head GEMV +1.2%; vLLM PR#38325 swapAB SM120 FP8 GEMM M≤64 +0.76%)"

      # self-host, SAME endpoint — config #2: AutoRound INT4 + AoE Ray (concurrent variant, contributor)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.5-122B · vLLM Ray cluster — AoE (contributor)"
        quant: "INT4 (Intel/Qwen3.5-122B-A10B-int4-AutoRound)"
        format: safetensors
        techniques: [technique-autoround, technique-mtp, technique-ray-serve]
        units: 2 # inferred from hardware.config "Ray cluster (multi-node, not single Spark)"
        replicates: "Qwen3.5-122B · vLLM @ 1× Spark — forum 365639 v2.4 (current best)"
        config:
          build: { image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        outcome:
          speed: { genTokS: 56, note: "Ray cluster — higher than single-Spark; explains the spread toward the title's 51" }
          quality:
            note: >-
              RECONCILIATION: results span 28.3 (v1) → 36.5 (AutoRound+MTP) → 38.4
              (v2 hybrid, single Spark) → 56 (AoE Ray cluster). The title's "51 tok/s"
              sits between single-Spark v2 and the cluster — it is NOT the verified
              single-Spark number (38.4). Also: llama-benchy reports ~20 tok/s because
              it measures decode steps, not user-facing throughput — a metric
              disagreement, not a config one.
          provenance:
            asOf: "2026-06-19"
            source: "https://forums.developer.nvidia.com/t/365639 (AoE)"
            verification: cited
            versionPins:
              vllm: "0.19.1rc1.dev15"
              image: "eugr/spark-vllm-docker (local build, tag vllm-node)"
            note: "MTP (85-100% accept)"

      # self-host, SAME endpoint — config #3: full FP8 (cluster-only TP=2 Ray; eugr recipe)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.5-122B-A10B · vLLM FP8 @ 2× DGX Spark (eugr recipe)"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-prefix-caching, technique-tensor-parallel, technique-ray-serve]
        units: 2
        download: { hfRepo: Qwen/Qwen3.5-122B-A10B-FP8, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          maxNumBatchedTokens: 8192
          toolCallParser: qwen3_coder
          reasoningParser: qwen3
          build: { image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
          mods: [mods/fix-qwen3.5-chat-template]
        command: |
          vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
            --max-model-len 262144 \
            --gpu-memory-utilization 0.8 \
            --port 8000 \
            --host 0.0.0.0 \
            --load-format fastsafetensors \
            --enable-prefix-caching \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_coder \
            --reasoning-parser qwen3 \
            --chat-template unsloth.jinja \
            -tp 2 --distributed-executor-backend ray \
            --max-num-batched-tokens 8192
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.5-122b-fp8.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.5-122b-fp8.yaml"
            verification: cited

      # self-host, SAME endpoint — config #4: pure INT4-AutoRound (eugr recipe; solo-capable, TP=2 throughput)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.5-122B-A10B · vLLM INT4-AutoRound @ DGX Spark (eugr recipe; solo-capable)"
        quant: int4-autoround
        format: safetensors
        techniques: [technique-autoround, technique-prefix-caching, technique-tensor-parallel, technique-ray-serve]
        units: 1 # INT4 (~66GB) fits ONE 128GB Spark — recipe flags `solo_only`; TP=2 is the throughput default for a 2-unit run, not a minimum
        replicates: "Qwen3.5-122B · vLLM @ 1× Spark — forum 365639 v2.4 (current best)" # forum 365639 hybrid INT4+FP8+MTP config
        download: { hfRepo: Intel/Qwen3.5-122B-A10B-int4-AutoRound, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          maxNumBatchedTokens: 8192
          toolCallParser: qwen3_xml
          reasoningParser: qwen3
          env: { VLLM_MARLIN_USE_ATOMIC_ADD: "1" }
          build: { image: "eugr/spark-vllm-docker (local build, tag vllm-node-tf5)" } # build_args: --tf5
          mods: [mods/fix-qwen3.5-chat-template]
        command: |
          vllm serve Intel/Qwen3.5-122B-A10B-int4-AutoRound \
            --max-model-len 262144 \
            --gpu-memory-utilization 0.8 \
            --port 8000 \
            --host 0.0.0.0 \
            --load-format fastsafetensors \
            --enable-prefix-caching \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_xml \
            --reasoning-parser qwen3 \
            --max-num-batched-tokens 8192 \
            --trust-remote-code \
            --chat-template unsloth.jinja \
            -tp 2 \
            --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.5-122b-int4-autoround.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure (cf. forum 365639's 38.4 t/s hybrid config)" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.5-122b-int4-autoround.yaml"
            verification: cited

      # self-host, SAME endpoint — config #5: DFlash block-diffusion drafter (forum
      # 374328, Entrpi). Headline: ~80 tok/s on AGENT traffic (high accept-length) on
      # ONE Spark — beats the MTP-2 path (52) when tool-call density is high.
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.5-122B-A10B · vLLM INT4-AutoRound + DFlash @ 1× DGX Spark (forum 374328)"
        quant: int4-autoround
        format: safetensors
        techniques: [technique-autoround, technique-dflash]
        units: 1 # single Spark (GB10/sm121)
        download:
          hfRepo: bleysg/Qwen3.5-122B-A10B-int4-fp8-hybrid # DENSE profile serves this PREBUILT hybrid (~67GiB safetensors, vLLM-direct); dflash/base/mtp profiles serve plain Intel/Qwen3.5-122B-A10B-int4-AutoRound
          format: safetensors
          note: >-
            dense-profile prebuilt: INT4 (AutoRound/GPTQ) routed experts + attention,
            calibrated FP8 shared experts, BF16 embeddings/head (~67GiB; NOT GGUF —
            vLLM serves directly). drafter z-lab/Qwen3.5-122B-A10B-DFlash = 0.8B /
            6-layer non-causal block-diffusion (block 16), shares embed_tokens +
            lm_head, ~1.6GiB.
        config:
          maxModelLen: 262144
          gpuMemoryUtilization: 0.82 # ~16GiB free; 0.88+ over-subscribes unified mem and swaps/stalls
          maxNumSeqs: 3 # concurrent-stream cap; pool holds ~1.6x (dense)/1.7x (dflash) a full 262k ctx
          maxNumBatchedTokens: 8192 # chunked-prefill chunk, kept below ctx
          speculative: "dflash, 12 draft tokens (block-drafted in ONE parallel forward)"
          toolCallParser: qwen3_xml # Qwen3.5 emits XML tool format; hermes parser returns 200 but empty tool_calls
          reasoningParser: qwen3
          loadFormat: fastsafetensors # ~3min to READY vs ~12min default; see claims
          build: { runtime: vLLM, version: "0.23.0", image: "ghcr.io/aeon-7/aeon-vllm-ultimate:2026-06-18-v0.23.0-dflashfix" } # AEON-7 sm121 DFlash image
          profiles: # install.sh --profile
            dense: "hybrid INT4+FP8 + int8 lm-head + DFlash n=12 (default; +28% base, ≈dflash on agents); KV pool 426,610 tok (1.63x)"
            dflash: "INT4 + DFlash n=12; largest KV pool 456,664 tok (1.74x); ~81 tok/s Hermes"
            base: "plain INT4, no spec-decode; 28.2 tok/s c=1 (airtight baseline)"
            mtp: "INT4 + native MTP-2 head; ~40 tok/s Hermes (comparison)"
          note: >-
            prefix-caching MUST be disabled for DFlash; scale-block KV unification
            patch required; ~16GiB free at READY (~15 under 3-stream peak).
        command: |
          vllm serve Intel/Qwen3.5-122B-A10B-int4-AutoRound \
            --enable-auto-tool-choice --tool-call-parser qwen3_xml \
            --reasoning-parser qwen3 \
            --speculative-model-type dflash --speculative_tokens 12 \
            --gpu-memory-utilization 0.82 --max-model-len 262144
        procedure: "https://github.com/Entrpi/qwen3.5-122B-A10B-on-spark (install.sh --start; profiles dense/dflash/base/mtp)"
        outcome:
          context: { tokens: 262144, note: "KV pool ~426k–456k tokens" }
          speed:
            genTokS: 81 # agent traffic: 73% tool-calls, accept-length ~8.3
            note: >-
              Progression: 28.2 plain INT4 → 51.58 MTP-2 (Albond baseline) → 53.7
              DFlash unpatched (accept ~6.5) → 59.0 +dense levers → ~81 on agent
              traffic (accept ~8.3). The 59.0 is the Albond e2e BENCHMARK harness; the
              ~81 is REAL-WORLD agent turns (Hermes, 73% tool-calls, 100k ctx) — a
              benchmark-vs-real-world gap, NOT two configs (corroborated forum 365639
              post 447). Dense decode-only single-stream: prose 48.8 / code 66.9 /
              agentic 121.8; 3-stream: prose 30.8 / code 43.0 / agentic 66.7. Dense
              levers' ~28% baseline gain amortizes to ~0 on high-accept agent traffic
              (dflash ≈ dense there).
          provenance:
            asOf: "2026-06-26"
            source: "https://forums.developer.nvidia.com/t/dflash-for-qwen3-5-122b-a10b-80-tok-s-on-1x-spark/374328 (Entrpi)"
            verification: cited
            confidence: medium
            versionPins: { runtime: vLLM, version: "0.23.0+aeon.sm121a.dflash", quant: int4-autoround }
        claims:
          - kind: finding
            body: >-
              DFlash vs MTP-2, SAME unpatched harness (Entrpi repo, GB10 c=1, temp 0):
              MTP-2 drafts 2 tokens SEQUENTIALLY so acceptance caps at ~3; DFlash
              block-drafts 12 in ONE PARALLEL forward, accepting 5-11 on
              predictable/agent traffic. Prose(acc~2.3): 28.2 base / 33.7 MTP / 33.2
              DFlash (use n=4) — they TIE on low-acceptance prose. Code(~5.4): 40.5 /
              54.5. Counting(~11): 43.7 (MTP capped) / 124.5. Hermes real turns(8.3):
              39.9 / ~81 — DFlash ~2x MTP. Unpatched DFlash e2e (53.7) already clears
              Albond's fully-patched MTP (51.58) on the same method. So: DFlash for
              structured/tool-call/code; the gain vanishes on open-ended prose.
            provenance:
              asOf: "2026-06-29"
              source: "https://github.com/Entrpi/qwen3.5-122B-A10B-on-spark (README benchmarks)"
              verification: cited
              confidence: medium
          - kind: finding
            body: >-
              FAST STARTUP on GB10: `--load-format fastsafetensors` reads the 62-71GiB
              checkpoint STRAIGHT TO DEVICE in ~32s vs ~8min for the default mmap
              per-tensor read + redundant CPU→GPU copy — the default loader is
              "pathologically slow on GB10's current kernel" and the copy is physically
              pointless on unified memory. Total time-to-READY ~3min (~32s load + ~42s
              torch.compile + ~2min CUDA-graph capture; compile cache persisted, later
              boots skip compile). Falls back to nogds — no GPUDirect hardware needed.
              Generalizable GB10 finding (see hardware-dgx-spark).
            provenance:
              asOf: "2026-06-29"
              source: "https://github.com/Entrpi/qwen3.5-122B-A10B-on-spark (README)"
              verification: cited
              confidence: medium
          - kind: note
            body: >-
              KV-POOL RECLAIM (dense profile, same 0.82 headroom): lifted 376,518 →
              426,610 tokens (+13%) WITHOUT spending headroom — the int8 lm-head frees
              its now-dead bf16 copy (~1.4GiB; the DFlash drafter shares the int8
              lm_head and tie_word_embeddings=False, so it's genuinely unused), and
              `VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=0` returns the CUDA-graph
              over-estimate (~0.6GiB; actual capture ~0.14GiB). NOTE the regime
              difference vs the drewid74 runbook, which sets the same var to 1 to FIX a
              low-GMU (0.80) silent OOM — at 0.82 with wide headroom Entrpi sets it to 0
              to RECLAIM the over-estimate. Stacks with technique-headless-serving-mode
              (the ~10-15GiB desktop reclaim) — orthogonal KV-pool levers.
            provenance:
              asOf: "2026-06-29"
              source: "https://github.com/Entrpi/qwen3.5-122B-A10B-on-spark (README, Memory and context)"
              verification: cited
              confidence: medium

      # M5 Max (Apple, MLX) — OptiQuant mxfp4 + TurboQuant staggered cache (forum 373482)
      - endpoint: endpoint-mlx-mac
        name: "Qwen3.5-122B-A10B · MLX OptiQuant mxfp4 (TurboQuant staggered cache) @ M5 Max"
        quant: "OptiQuant mxfp4 + TurboQuant staggered KV cache"
        format: mlx
        techniques: [technique-mxfp4, technique-kv-quant-fp4]
        units: 1
        config: { maxModelLen: 262144 } # practical ~80-100K
        procedure: "https://forums.developer.nvidia.com/t/373482 (post 38)"
        outcome:
          context: { tokens: 262144, note: "256K max; practical ~80-100K" }
          speed:
            prefillTokS: 1005.7 # 1024-token prompt
            genTokS: 49.7
            note: >-
              M5 Max 40-core GPU; 68.7GB peak. mxfp4 + TurboQuant staggered cache. M5
              DOMINATES decode here vs the 2x DGX Spark same-model path (~26 t/s decode)
              — driven by M5's ~612 GB/s LPDDR bandwidth vs GB10's ~275 GB/s. Spark's
              counter-advantage is 1M OPERATIONAL context (M5 practical ~80-100K).
          provenance:
            asOf: "2026-06-28"
            source: "https://forums.developer.nvidia.com/t/deliberations-on-4-sparks-cluster-advantages/373482 (post 38)"
            verification: cited
            confidence: medium
            versionPins: { runtime: mlx-lm, quant: "OptiQuant mxfp4" }
      # gateway — endpoint-openrouter: carries PRICE, not config
      - endpoint: endpoint-openrouter
        providerModelId: "qwen/qwen3.5-122b-a10b"
        cost:
          perMTokInUsd: 0.26
          perMTokOutUsd: 2.08
          provenance:
            asOf: "2026-06-19"
            source: "https://openrouter.ai/api/v1/models"
            verification: authoritative
  claims:
    - kind: note
      body: >-
        COMMUNITY (single-Spark coding, forum 374423): "extremely good" in Agent
        Zero (keving3) and a common home/work pick on int4-autoround via
        eugr/spark-vllm-docker (engineering68), but at ~26 t/s "can't work
