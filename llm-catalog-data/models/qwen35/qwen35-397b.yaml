        download: { hfRepo: Qwen/Qwen3.5-397B-A17B-FP8, format: safetensors, kvCacheDtype: fp8 }
        config:
          maxModelLen: 262144
          tensorParallel: 4
          maxNumSeqs: 32
          maxNumBatchedTokens: 8192
          toolCallParser: qwen3_coder
          reasoningParser: qwen3
          env: { VLLM_USE_DEEP_GEMM: "0", VLLM_USE_FLASHINFER_MOE_FP16: "1", VLLM_USE_FLASHINFER_SAMPLER: "0", OMP_NUM_THREADS: "4" }
          build: { image: "eugr/spark-vllm-docker (local build, tag vllm-node-tf5)" } # build_args: --tf5
          mods: [mods/fix-qwen3.5-autoround]
        command: |
          vllm serve Qwen/Qwen3.5-397B-A17B-FP8 \
            --max-model-len 262144 \
            --gpu-memory-utilization 0.85 \
            --port 8000 \
            --host 0.0.0.0 \
            --load-format fastsafetensors \
            --enable-prefix-caching \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_coder \
            --reasoning-parser qwen3 \
            --max-num-batched-tokens 8192 \
            --trust-remote-code \
            -tp 4 \
            --distributed-executor-backend ray \
            --mm-encoder-tp-mode data \
            --kv-cache-dtype fp8 \
            --compilation-config.cudagraph_mode none \
            --max-num-seqs 32 \
            --attention-backend flashinfer
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/4x-spark-cluster/qwen3.5-397b-a17B-fp8.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
