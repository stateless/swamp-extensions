# Qwen 3.6 27B (DENSE) — a separate line from the 35B-A3B MoE flagship. Distinct
# from Qwen3.5-27B. Architecture from community/forum reports; full HF config.json
# verification pending. One MEASURED single-Spark recipe embedded in runsOn[].

- id: model-qwen36-27b
  kind: model
  name: Qwen 3.6 27B (dense)
  summary: Dense 27B; multimodal; ~196K context; sibling line to the 35B-A3B MoE
  visibility: public
  labels: [qwen, dense, multimodal]
  relations:
    - { rel: variant-of, target: model-qwen36 }
  facets:
    aaIntelligence:
      index: 37
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      params: "27B"
      nativeContext: 196608
      modality: [text, image]
      note: "dense (non-MoE); layers/hidden/exact params not yet HF-verified — confirm against config.json"
      provenance:
        asOf: "2026-06-22"
        source: "https://forums.developer.nvidia.com/t/whats-the-best-speed-we-can-get-with-qwen-3-6-27b-without-quantizing/367561"
        verification: cited
        confidence: low
    runsOn:
      # ★ MEASURED single-Spark NVFP4 + DFlash — forum 367561 (ajvazan)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-27B · vLLM NVFP4 + DFlash @ 1× DGX Spark (MEASURED)"
        quant: nvfp4
        format: safetensors # Modelopt (multimodal); BF16 body
        techniques: [technique-nvfp4, technique-dflash, technique-prefix-caching, technique-flashattention]
        units: 1
        config:
          maxModelLen: 196608
          tensorParallel: 1
          gpuMemoryUtilization: 0.65
          speculative: "dflash (10 tokens; ajvazan #34 recommends reducing to ~6)"
          attentionBackend: flashinfer
          kvCacheDtype: auto
          build: { runtime: vLLM, version: "0.22.1+pr44389.aeon" }
        outcome:
          context: { tokens: 196608 }
          speed:
            genTokS: 33.2 # decode c1
            note: "decode 33.2 c1 / 56.8 c2 / 90.8 c4; raw coding bursts ~65 t/s on large ctx; prefill ~2.1k tok/s; high startup mem (~95%) then stabilises"
          measurements:
            - { concurrency: 1, prefillTokS: 2117, decodeTokS: 33.2, ttftMs: 2790 }
            - { concurrency: 2, prefillTokS: 1861, decodeTokS: 56.8 }
            - { concurrency: 4, prefillTokS: 1951, decodeTokS: 90.8 }
          provenance:
            asOf: "2026-06-22"
            source: "https://forums.developer.nvidia.com/t/whats-the-best-speed-we-can-get-with-qwen-3-6-27b-without-quantizing/367561/34"
            verification: cited
            confidence: medium
            versionPins: { runtime: vLLM, version: "0.22.1+pr44389.aeon", quant: nvfp4 }
      # spark-auto-round: OpenCode-calibrated INT4-AutoRound (whpthomas tool, forum 373475)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-27B · vLLM INT4-AutoRound (OpenCode-calibrated, spark-auto-round)"
        quant: int4-autoround
        format: safetensors
        techniques: [technique-autoround, technique-spark-auto-round, technique-prefix-caching]
        units: 1
        download: { hfRepo: coder3101/Qwen3.6-27B-int4-AutoRound, format: safetensors, packager: spark-auto-round, note: "OpenCode-Instruct calibration (default dataset)" }
        config: { maxModelLen: 196608 }
        procedure: "https://github.com/whpthomas/spark-auto-round (`spark-auto-round <model>`; auto_round output)"
        outcome:
          context: { tokens: 196608 }
          speed: { genTokS: 26.4, note: "26.4 tok/s (whpthomas); community 0rand 20–21 t/s — 'better at writing code but lacks knowledge'" }
          quality:
            toolEvalBench: "92/100"
            note: >-
              OpenCode-calibrated INT4 — use-case-matched calibration lifts tool-eval
              (whpthomas, forum 373475). The concrete close-the-AA-gap path vs generic
              AutoRound (see technique-spark-auto-round).
          provenance:
            asOf: "2026-06-26"
            source: "https://forums.developer.nvidia.com/t/introducing-spark-auto-round-w-opencode-instruct-dataset/373475 + github.com/whpthomas/spark-auto-round"
            verification: cited
            confidence: medium
            versionPins: { quant: int4-autoround, packager: spark-auto-round }
  claims:
    - kind: note
      body: >-
        Dense 27B (non-MoE), multimodal, ~196K context. Distinct from Qwen3.5-27B
        and from the Qwen3.6-35B-A3B MoE. Params/layers from a community forum
        report; full HF config.json verification pending (confidence low on the
        architecture, medium on the measured speed).
      provenance:
        asOf: "2026-06-22"
        source: "https://forums.developer.nvidia.com/t/whats-the-best-speed-we-can-get-with-qwen-3-6-27b-without-quantizing/367561"
        verification: cited
        confidence: low
