# Qwen 3.6 35B-A3B (MoE) — the flagship Qwen 3.6 variant (2026-04-16). A dense
# Qwen 3.6 27B sibling also exists (see qwen36-27b.yaml).
# Model-level facets (architecture, vendor benchmarks, footprint) + access-paths
# embedded as facets.runsOn[] keyed by endpoint. Perf-determining fields
# (quant/units/techniques/versionPins) are explicit on every runsOn entry.

- id: model-qwen36-35b-a3b
  kind: model
  name: Qwen 3.6 35B-A3B (MoE)
  summary: Sparse MoE; 3B active at 35B total; 262K native (→1M YaRN); multimodal
  visibility: public
  labels: [qwen, moe, multimodal]
  relations:
    - { rel: variant-of, target: model-qwen36 }
  facets:
    aaIntelligence:
      index: 32
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      attention: hybrid-deltanet
      params: "35B"
      activeParams: "3B"
      layers: 40
      experts: "8 routed + 1 shared / 256 total"
      hiddenDim: 2048
      nativeContext: 262144 # ~1M via YaRN
      modality: [text, image, video]
      mtp: true # multi-token prediction
    benchmarks: # Qwen-published (instruction-tuned), Qwen3.6-35B-A3B column
      sweBenchVerified: 73.4
      sweBenchMultilingual: 67.2
      terminalBench2: 51.5
      qwenWebBench: 1397
      mcpMark: 37.0
      gpqaDiamond: 86.0
      aime2026: 92.7
      mmluPro: 85.2
      liveCodeBenchV6: 80.4
      provenance:
        asOf: "2026-06-19"
        source: "https://qwen.ai/blog?id=qwen3.6-35b-a3b"
        verification: cited
    footprint: # Unsloth-published per-quant memory (weights-only); fits a single DGX Spark
      basis: weights-only
      quants:
        - { quant: "3-bit", memGB: 17 }
        - { quant: "4-bit", memGB: 23, note: "UD-Q4_K_XL recommended balance" }
        - { quant: "6-bit", memGB: 30 }
        - { quant: "8-bit", memGB: 38 }
        - { quant: BF16, memGB: 70 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/qwen3.6"
        verification: cited
    runsOn:
      # ★ Atlas (pure-Rust engine) — Recipe A, "daily driver for agentic coding"
      - endpoint: endpoint-atlas-dgx-spark
        name: "Qwen3.6-35B-A3B · Atlas FP8 (Recipe A) @ DGX Spark"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-mtp, technique-prefix-caching]
        units: 1
        config:
          maxModelLen: 16384 # capped at 16K (was over-provisioned at 131K)
          speculative: "mtp (K=2)"
          kvCacheDtype: "fp8 + auto-promoted boundary layers"
          build: { runtime: Atlas, image: "avarok/atlas-gb10:latest" }
        command: "sudo docker run -d --network host --gpus all --ipc=host avarok/atlas-gb10:latest serve Qwen/Qwen3.6-35B-A3B-FP8 --port 8888"
        procedure: "https://github.com/Avarok-Cybersecurity/atlas"
        outcome:
          context: { tokens: 16384 }
          speed:
            genTokS: 84 # community single-thread 75-93 (forum 369263); repo headline claims ~130
            note: "DISCREPANCY: repo Recipe A claims ~130 tok/s; community SINGLE-THREAD measured 75-93 (forum 369263, AzeezIsh maintainer + users); ~35-40% throughput drop at 2× concurrency. Use ~75-93 single-stream as the trustable number until reconciled. ~2min cold start."
          provenance:
            asOf: "2026-06-23"
            source: "https://github.com/Avarok-Cybersecurity/atlas (Recipe A) + https://forums.developer.nvidia.com/t/369263"
            verification: cited
            confidence: medium
            versionPins: { runtime: "Atlas (avarok/atlas-gb10:latest, ~100 commits, no version pin)", quant: fp8 }
      # ★ MEASURED single-Spark NVFP4 + MTP-3 — benchmark report (forum 371810, llama-benchy).
      # The standout local number: 126 tok/s decode on ONE Spark; strong prefill.
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-35B-A3B · vLLM NVFP4 + MTP-3 @ 1× DGX Spark (MEASURED)"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-mtp, technique-prefix-caching, technique-flashattention]
        units: 1 # TP=1, single Spark (NOT the eugr 2× recipe)
        download: { hfRepo: nvidia/Qwen3.6-35B-A3B-NVFP4, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 1
          speculative: "mtp (3 tokens, triton)"
          attentionBackend: flashinfer
          build: { runtime: vLLM, version: "0.22.1rc1.dev32" }
        outcome:
          context: { tokens: 262144 }
          speed:
            genTokS: 126.1 # decode c1 @ pp2048 (llama-benchy)
            note: "decode 126.1 c1 / 189.9 c2 / 156.3 c4; prefill ~6.4k tok/s; spec-decode best 131 eff t/s @8K code, 92% accept"
          measurements:
            - { concurrency: 1, promptTokens: 2048, prefillTokS: 6437, decodeTokS: 126.1, ttftMs: 1010 }
            - { concurrency: 2, promptTokens: 2048, prefillTokS: 6405, decodeTokS: 189.9, ttftMs: 1903 }
            - { concurrency: 4, promptTokens: 2048, prefillTokS: 6563, decodeTokS: 156.3, ttftMs: 3169 }
          quality: { toolEvalBench: "92/100" }
          provenance:
            asOf: "2026-06-22"
            source: "https://forums.developer.nvidia.com/t/benchmark-report-qwen3-6-35b-a3b-nvfp4-on-nvidia-dgx-spark-jetson-thor-blackwell-6000-pro/371810"
            verification: cited
            confidence: medium
            versionPins: { runtime: vLLM, version: "0.22.1rc1.dev32", quant: nvfp4 }
      # ★ MEASURED single-Spark FP8 — forum 366822 (serapis / cosinus).
