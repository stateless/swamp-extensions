# Qwen 3.6 35B-A3B (MoE) — the only released Qwen 3.6 variant (2026-04-16).
# Model-level facets (architecture, vendor benchmarks, footprint) + access-paths
# embedded as facets.runsOn[] keyed by endpoint. Perf-determining fields
# (quant/units/techniques/versionPins) are explicit on every runsOn entry.

- id: model-qwen36-35b-a3b
  kind: model
  name: Qwen 3.6 35B-A3B (MoE)
  summary: Sparse MoE; 3B active at 35B total; 262K native (→1M YaRN); multimodal
  visibility: public
  labels: [qwen, moe, multimodal]
  relations:
    - { rel: variant-of, target: model-qwen36 }
  facets:
    architecture:
      attention: hybrid-deltanet
      params: "35B"
      activeParams: "3B"
      layers: 40
      experts: "8 routed + 1 shared / 256 total"
      hiddenDim: 2048
      nativeContext: 262144 # ~1M via YaRN
      modality: [text, image, video]
      mtp: true # multi-token prediction
    benchmarks: # Qwen-published (instruction-tuned), Qwen3.6-35B-A3B column
      sweBenchVerified: 73.4
      sweBenchMultilingual: 67.2
      terminalBench2: 51.5
      qwenWebBench: 1397
      mcpMark: 37.0
      gpqaDiamond: 86.0
      aime2026: 92.7
      mmluPro: 85.2
      liveCodeBenchV6: 80.4
      provenance:
        asOf: "2026-06-19"
        source: "https://qwen.ai/blog?id=qwen3.6-35b-a3b"
        verification: cited
    footprint: # Unsloth-published per-quant memory (weights-only); fits a single DGX Spark
      basis: weights-only
      quants:
        - { quant: "3-bit", memGB: 17 }
        - { quant: "4-bit", memGB: 23, note: "UD-Q4_K_XL recommended balance" }
        - { quant: "6-bit", memGB: 30 }
        - { quant: "8-bit", memGB: 38 }
        - { quant: BF16, memGB: 70 }
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/qwen3.6"
        verification: cited
    runsOn:
      # self-host #1: Qwen native FP8 @ 2× Spark (eugr recipe) — was ap-qwen36-35b-spark-vllm-fp8
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-35B-A3B · vLLM FP8 @ 2× DGX Spark (eugr recipe)"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-prefix-caching, technique-flashattention, technique-tensor-parallel, technique-ray-serve]
        units: 2 # TP=2 Ray cluster
        download: { hfRepo: Qwen/Qwen3.6-35B-A3B-FP8, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.8
          toolCallParser: qwen3_xml
          attentionBackend: flashinfer
          maxNumBatchedTokens: 16384
          kvCacheDtype: fp8
          env: { VLLM_MARLIN_USE_ATOMIC_ADD: "1" }
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
          mods: [mods/fix-qwen3.6-chat-template]
        command: |
          vllm serve Qwen/Qwen3.6-35B-A3B-FP8 \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 262144 \
            --max-num-batched-tokens 16384 \
            --gpu-memory-utilization 0.8 \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_xml \
            --kv-cache-dtype fp8 \
            --load-format fastsafetensors \
            --attention-backend flashinfer \
            --enable-prefix-caching \
            --chat-template fixed_chat_template.jinja \
            -tp 2 \
            --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-fp8.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-fp8.yaml"
            verification: cited
      # self-host #2: FP8 + DFlash spec-decode @ 2× Spark — was ap-qwen36-35b-spark-vllm-fp8-dflash
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-35B-A3B · vLLM FP8 + DFlash @ 2× DGX Spark (eugr recipe)"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-dflash, technique-tensor-parallel, technique-ray-serve]
        units: 2 # TP=2 Ray cluster
        download: { hfRepo: Qwen/Qwen3.6-35B-A3B-FP8, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.8
          toolCallParser: qwen3_xml
          reasoningParser: qwen3
          attentionBackend: flash_attn
          maxNumBatchedTokens: 16384
          speculative: "dflash (z-lab/Qwen3.6-35B-A3B-DFlash, 15 tokens)"
          env: { VLLM_MARLIN_USE_ATOMIC_ADD: "1" }
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
          mods: [mods/fix-qwen3.6-chat-template]
        command: |
          vllm serve Qwen/Qwen3.6-35B-A3B-FP8 \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 262144 \
            --max-num-batched-tokens 16384 \
            --gpu-memory-utilization 0.8 \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_xml \
            --reasoning-parser qwen3 \
            --load-format fastsafetensors \
            --attention-backend flash_attn \
            --chat-template fixed_chat_template.jinja \
            --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 15}' \
            -tp 2 \
            --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-fp8-dflash.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe (DFlash spec-decode for throughput); tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-fp8-dflash.yaml"
            verification: cited
      # self-host #3: NVFP4 + MTP-3 spec-decode @ 2× Spark — was ap-qwen36-35b-spark-vllm-nvfp4
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-35B-A3B · vLLM NVFP4 + MTP @ 2× DGX Spark (eugr recipe)"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-mtp, technique-prefix-caching, technique-flashattention, technique-tensor-parallel, technique-ray-serve]
        units: 2 # TP=2 Ray cluster
        download: { hfRepo: nvidia/Qwen3.6-35B-A3B-NVFP4, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.4
          toolCallParser: qwen3_xml
          reasoningParser: qwen3
          attentionBackend: flashinfer
          maxNumSeqs: 4
          maxNumBatchedTokens: 8192
          kvCacheDtype: auto
          moeBackend: marlin
          speculative: "mtp (3 tokens, triton moe)"
          env: { VLLM_MARLIN_USE_ATOMIC_ADD: "1" }
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        command: |
          vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 2 \
            --trust-remote-code \
            --kv-cache-dtype auto \
            --attention-backend flashinfer \
            --moe-backend marlin \
            --gpu-memory-utilization 0.4 \
            --max-model-len 262144 \
            --max-num-seqs 4 \
            --max-num-batched-tokens 8192 \
            --enable-chunked-prefill \
            --async-scheduling \
            --enable-prefix-caching \
            --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}' \
            --load-format fastsafetensors \
            --reasoning-parser qwen3 \
            --tool-call-parser qwen3_xml \
            --enable-auto-tool-choice \
            --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-nvfp4.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe (NVFP4 + MTP-3); tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-nvfp4.yaml"
            verification: cited
      # self-host #4: NVFP4, MTP disabled @ 2× Spark — was ap-qwen36-35b-spark-vllm-nvfp4-no-mtp
      - endpoint: endpoint-vllm-dgx-spark
        name: "Qwen3.6-35B-A3B · vLLM NVFP4 (no MTP) @ 2× DGX Spark (eugr recipe)"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-prefix-caching, technique-flashattention, technique-tensor-parallel, technique-ray-serve]
        units: 2 # TP=2 Ray cluster
        download: { hfRepo: nvidia/Qwen3.6-35B-A3B-NVFP4, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.4
          toolCallParser: qwen3_xml
          reasoningParser: qwen3
          attentionBackend: flashinfer
          maxNumSeqs: 4
          maxNumBatchedTokens: 8192
          kvCacheDtype: auto
          moeBackend: marlin
          env: { VLLM_MARLIN_USE_ATOMIC_ADD: "1" }
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        command: |
          vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 2 \
            --trust-remote-code \
            --kv-cache-dtype auto \
            --attention-backend flashinfer \
            --moe-backend marlin \
            --gpu-memory-utilization 0.4 \
            --max-model-len 262144 \
            --max-num-seqs 4 \
            --max-num-batched-tokens 8192 \
            --enable-chunked-prefill \
            --async-scheduling \
            --enable-prefix-caching \
            --load-format fastsafetensors \
            --reasoning-parser qwen3 \
            --tool-call-parser qwen3_xml \
            --enable-auto-tool-choice \
            --distributed-executor-backend ray
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-nvfp4-no-mtp.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe (NVFP4, MTP disabled — compare vs the MTP variant); tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-nvfp4-no-mtp.yaml"
            verification: cited
      # self-host #5: Unsloth GGUF via llama.cpp (host-agnostic; ~23GB) — was ap-qwen36-35b-gguf-llamacpp
      - endpoint: endpoint-llamacpp
        name: "Qwen3.6-35B-A3B · llama.cpp GGUF (Unsloth)"
        quant: "UD-Q4_K_XL"
        format: gguf
        techniques: [technique-gguf-kquant, technique-unsloth-dynamic]
        download: { hfRepo: "unsloth/Qwen3.6-35B-A3B-GGUF", format: gguf, packager: unsloth }
        config:
          maxModelLen: 262144
        command: |
          export LLAMA_CACHE="unsloth/Qwen3.6-35B-A3B-GGUF"
          ./llama.cpp/llama-cli -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL \
            --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.00
        note: "thinking-general sampling (temp 1.0/top_p 0.95/top_k 20/min_p 0.0); recommended output 32768. Multimodal needs --mmproj; use llama.cpp not Ollama."
        procedure: "https://unsloth.ai/docs/models/qwen3.6"
        outcome:
          context: { tokens: 262144 }
          provenance:
            asOf: "2026-06-20"
            source: "https://unsloth.ai/docs/models/qwen3.6"
            verification: cited
  claims:
    - kind: note
      body: >-
        262K native context, extensible to ~1M via YaRN. Approximate memory
        footprint by quant (vendor/community estimate): 3-bit ~17 GB, 4-bit
        ~23 GB, 6-bit ~30 GB, 8-bit ~38 GB, BF16 ~70 GB.
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/Qwen/Qwen3.6-35B-A3B + https://unsloth.ai/docs/models/qwen3.6"
        verification: cited
    - kind: note
      body: >-
        Only the 35B-A3B variant has been released (2026-04-16); additional
        Qwen 3.6 variants are expected but not yet published. Vendor-published
        benchmarks above are notably stronger on coding-agent tasks vs
        Qwen3.5-35B-A3B (SWE-bench Verified +3.4, Terminal-Bench +11,
        QwenWebBench +43%); general knowledge/math (MMLU-Pro, GPQA, AIME) is
        comparable to 3.5.
      provenance:
        asOf: "2026-06-19"
        source: "https://qwen.ai/blog?id=qwen3.6-35b-a3b"
        verification: cited
    # was ap-qwen36-35b-gguf-llamacpp claims (vendor/packager perf, not our-fleet)
    - kind: note
      body: >-
        Unsloth reports ~240 tok/s on an RTX 6000 with MTP enabled
        (--spec-draft-n-max 2); Unsloth quants land on the KLD SOTA Pareto
        frontier (21/22 sizes). Generic vendor/packager figures, not our-fleet.
      provenance:
        asOf: "2026-06-20"
        source: "https://unsloth.ai/docs/models/qwen3.6"
        verification: cited
