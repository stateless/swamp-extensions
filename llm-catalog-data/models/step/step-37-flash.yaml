# Step-3.7-Flash family (StepFun). Public + generic. Architecture VERIFIED against
# the canonical stepfun-ai/Step-3.7-Flash HF config.json (2026-06-20) →
# authoritative. model_type step3p7: a multimodal (vision-encoder + text) MoE.
# The eugr spark-vllm-docker recipes serve the FP8 and NVFP4 checkpoints on a 2×
# DGX Spark cluster (cluster_only). One repo published in two precisions → two
# facets.runsOn[] operating points (the quant tradeoff is cross-operating-point).
#
# Params: text safetensors index ~403GB BF16 → ~200B total estimated; exact
# published total/active not stated on the card, so total carries verification:
# cited (the layer/expert/context shape is authoritative from config.json).
# ONE model per file; run-options embedded in facets.runsOn[] keyed by endpoint.

- id: model-step-37-flash
  kind: model
  name: Step-3.7-Flash
  summary: StepFun multimodal MoE (step3p7); 288-expert/8-active text MoE + vision encoder; 256K context
  visibility: public
  labels: [stepfun, step, moe, multimodal, vision]
  facets:
    aaIntelligence:
      index: 30
      basis: reference-precision # AA serves ~reference precision (provider-blended); NOT the local runsOn quant. Upper bound — read runsOn.outcome.quality for the deployed quant.
      config: reasoning
      estimated: false
      provenance:
        asOf: "2026-06-25"
        source: "Artificial Analysis leaderboard — artifacts/benchmarks/aa-leaderboard-2026-06-25.md"
        confidence: medium
    architecture:
      hfRepo: stepfun-ai/Step-3.7-Flash
      modelType: step3p7 # text backbone step3p5; perception_encoder vision tower
      attention: full-attention # GQA: 64 heads / 8 groups, head_dim 128; YaRN on full-attention layers
      params: "~200B" # est. from ~403GB BF16 text index
      activeParams: "unknown" # 8/288 experts/token (active count not published)
      layers: 45 # text_config.num_hidden_layers
      hidden: 4096
      experts: "8/token of 288 routed + 1 shared (share_expert_dim 1280)"
      nativeContext: 262144 # text_config.max_position_embeddings (llama3 RoPE x2 over 131072 orig)
      vocab: 128896
      modality: [text, image] # vision_config perception_encoder, image_size 728
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/stepfun-ai/Step-3.7-Flash/resolve/main/config.json"
        verification: authoritative
    license:
      spdx: apache-2.0
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/api/models/stepfun-ai/Step-3.7-Flash (cardData.license=apache-2.0)"
        verification: authoritative
    defaults: # model-level defaults (the "standard answer"); recipes may override
      maxContext: 262144
      toolCallParser: step3p5
      reasoningParser: step3p5
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/stepfun-ai/Step-3.7-Flash/resolve/main/config.json (step3p5 parsers per eugr recipes)"
        verification: cited
    runsOn:
      # self-host #1: StepFun FP8 @ 2× Spark (eugr recipe; cluster_only, use --no-ray)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Step-3.7-Flash · vLLM FP8 @ 2× DGX Spark (eugr recipe)"
        quant: fp8
        format: safetensors
        techniques: [technique-fp8, technique-tensor-parallel, technique-ray-serve]
        units: 2 # cluster_only; recipe note: use with --no-ray
        download: { hfRepo: stepfun-ai/Step-3.7-Flash-FP8, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          maxNumSeqs: 2
          toolCallParser: step3p5
          reasoningParser: step3p5
          kvCacheDtype: fp8
          gpuMemoryUtilizationGb: 108 # --gpu-memory-utilization-gb (mods/gpu-mem-util-gb); GB not fraction
          mods: [mods/step-3.7-flash, mods/gpu-mem-util-gb]
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        command: |
          vllm serve stepfun-ai/Step-3.7-Flash-FP8 \
              --trust-remote-code \
              --port 8000 \
              --host 0.0.0.0 \
              --gpu-memory-utilization-gb 108 \
              -tp 2 \
              --distributed-executor-backend ray \
              --max-model-len 262144 \
              --enable-auto-tool-choice \
              --reasoning-parser step3p5 \
              --tool-call-parser step3p5 \
              --load-format safetensors \
              --kv-cache-dtype fp8 \
              --max-num-seqs 2
        summary: StepFun FP8; cluster-only (TP=2, Ray; use --no-ray); gpu-mem in GB; 256K context
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/step-3.7-flash-fp8.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/step-3.7-flash-fp8.yaml"
            verification: cited
      # self-host #2: StepFun NVFP4 4-bit @ 2× Spark (eugr recipe; cluster_only)
      - endpoint: endpoint-vllm-dgx-spark
        name: "Step-3.7-Flash · vLLM NVFP4 @ 2× DGX Spark (eugr recipe)"
        quant: nvfp4
        format: safetensors
        techniques: [technique-nvfp4, technique-tensor-parallel, technique-ray-serve]
        units: 2 # cluster_only
        download: { hfRepo: stepfun-ai/Step-3.7-Flash-NVFP4, format: safetensors }
        config:
          maxModelLen: 262144
          tensorParallel: 2
          gpuMemoryUtilization: 0.8
          toolCallParser: step3p5
          reasoningParser: step3p5
          loadFormat: instanttensor
          mods: [mods/step-3.7-flash]
          build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node)" }
        command: |
          vllm serve stepfun-ai/Step-3.7-Flash-NVFP4 \
              --trust-remote-code \
              --port 8000 \
              --host 0.0.0.0 \
              --gpu-memory-utilization 0.8 \
              -tp 2 \
              --distributed-executor-backend ray \
              --max-model-len 262144 \
              --enable-auto-tool-choice \
              --reasoning-parser step3p5 \
              --tool-call-parser step3p5 \
              --load-format instanttensor
        summary: StepFun NVFP4 4-bit; cluster-only (TP=2, Ray); InstantTensor load; 256K context
        procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/step-3.7-flash-nvfp4.yaml"
        outcome:
          context: { tokens: 262144 }
          speed: { note: "published recipe; tok/s not benchmarked in repo — measure" }
          provenance:
            asOf: "2026-06-20"
            source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/step-3.7-flash-nvfp4.yaml"
            verification: cited
  claims:
    - kind: note
      body: >-
        VERIFIED against HF config.json (2026-06-20): model_type step3p7 (text
        backbone step3p5 + perception_encoder vision tower), 45 text layers,
        288 routed experts, top-8/token, 1 shared expert (share_expert_dim 1280),
        hidden 4096, GQA 64 heads / 8 groups, vocab 128896, native context 262144
        (llama3 RoPE scaling factor 2.0 over 131072 original, YaRN on full-attention
        layers), apache-2.0. Total params (~200B) estimated from the BF16 index;
        active-param count not published — re-verify against a primary source.
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/stepfun-ai/Step-3.7-Flash/resolve/main/config.json + model.safetensors.index.json"
        verification: cited
