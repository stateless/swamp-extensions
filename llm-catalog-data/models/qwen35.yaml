# ── self-host configs: Qwen3.5-122B on DGX Spark via vLLM (forum 365639) ─────
#  LINEAGE STRATEGY: a config's LINEAR progression (Albond v1 → v2 → …) is NOT
#  enumerated as separate entries — only the current-best config is a live entry,
#  and the v1→v2 evolution lives in THIS FILE'S GIT HISTORY (`git log -p`). That
#  keeps the model files small. CONCURRENT/disagreeing variants (a different
#  contributor's cluster result) genuinely coexist, so they DO get their own
#  entry + a `replicates`/`alt-config-of` relation — git can't branch-compare.
#  (Corrects an earlier placeholder that wrongly said llama.cpp + Unsloth GGUF.)

- id: ap-qwen35-122b-spark-vllm
  kind: access-path
  name: Qwen3.5-122B · vLLM @ 1× Spark — Albond (current best)
  summary: AutoRound INT4 + Qwen FP8 shared-expert layers + MTP-1; 38.4 tok/s single-Spark
  visibility: public
  relations:
    - { rel: of-model, target: model-qwen35-122b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-autoround } # quant method
    - { rel: uses-technique, target: technique-fp8 } # + FP8 for shared-expert layers
  facets:
    recipe:
      build: { runtime: vLLM, version: "0.19" }
      artifact: { quant: "hybrid INT4 (AutoRound) + FP8 (Qwen official, 144 shared-expert dense layers)", format: safetensors }
      hardware: { units: 1, accel: GB10 }
      technique: "MTP-1 speculative decoding (~95% accept); ~95-line vLLM INC quant patch"
      procedure: "https://forums.developer.nvidia.com/t/365639"
    outcome:
      speed:
        genTokS: 38.4
        range: "36.3-39.9 across Q&A/code/JSON/math/long-code"
        note: "title claims 51 tok/s; author's VERIFIED single-Spark figure is 38.4"
      quality:
        measured: null # the thread reports THROUGHPUT only, not output quality
        note: >-
          No output-quality measured for this AutoRound-INT4 config — INT4 quant
          CAN degrade outputs, so speed alone doesn't certify it. Reference
          ceiling = model-qwen35-122b published benchmarks; treat as UNVERIFIED
          for quality until an eval on THIS config exists.
        verification: unverified
      provenance: &fwd365639
        asOf: "2026-06-19"
        source: "https://forums.developer.nvidia.com/t/365639 (Albond)"
        verification: cited
  claims:
    - kind: note
      body: >-
        Config progression (Albond): v1 AutoRound INT4 = 28.3 tok/s → v2 added
        Qwen FP8 shared-expert layers + MTP-1 = 38.4. Only the current-best config
        is a live entry; the full v1→v2 evolution is in this file's git history.
      provenance: *fwd365639
    - kind: finding
      body: "MTP-1 alone is the biggest win; the hybrid INT4+FP8 adds only ~2 tok/s on top of AutoRound+MTP (36.5 → 38.4)."
      provenance: *fwd365639
    - kind: note
      body: "Corroborated by norman.2 (~38.6-40 tok/s, same hybrid+MTP config, community vLLM docker)."
      provenance: *fwd365639

- id: ap-qwen35-122b-spark-vllm-aoe-ray
  kind: access-path
  name: Qwen3.5-122B · vLLM Ray cluster — AoE (contributor)
  summary: AutoRound INT4 on a Ray cluster; up to 56 tok/s — DISAGREES with single-Spark
  visibility: public
  relations:
    - { rel: of-model, target: model-qwen35-122b }
    - { rel: served-by, target: runtime-vllm }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: replicates, target: ap-qwen35-122b-spark-vllm } # concurrent variant — kept as its own entry, not git
    - { rel: uses-technique, target: technique-autoround } # quant method
    - { rel: uses-technique, target: technique-ray-serve } # Ray cluster (vs single-Spark)
  facets:
    recipe:
      build: { runtime: vLLM, version: "0.19.1rc1.dev15" }
      artifact: { quant: "INT4 (Intel/Qwen3.5-122B-A10B-int4-AutoRound)", format: safetensors }
      hardware: { config: "Ray cluster (multi-node, not single Spark)" }
      technique: "MTP (85-100% accept)"
    outcome:
      speed: { genTokS: 56, note: "Ray cluster — higher than single-Spark; explains the spread toward the title's 51" }
      provenance:
        asOf: "2026-06-19"
        source: "https://forums.developer.nvidia.com/t/365639 (AoE)"
        verification: cited
  claims:
    - kind: caveat
      body: >-
        RECONCILIATION: results span 28.3 (v1) → 36.5 (AutoRound+MTP) → 38.4
        (v2 hybrid, single Spark) → 56 (AoE Ray cluster). The title's "51 tok/s"
        sits between single-Spark v2 and the cluster — it is NOT the verified
        single-Spark number (38.4). Also: llama-benchy reports ~20 tok/s because
        it measures decode steps, not user-facing throughput — a metric
        disagreement, not a config one.
      provenance: *fwd365639

