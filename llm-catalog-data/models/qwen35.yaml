      artifact: { quant: fp8, format: safetensors }
      hardware: { units: 2, accel: GB10 } # cluster_only: true
      mods: [mods/fix-qwen3.5-chat-template]
      command: |
        vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
