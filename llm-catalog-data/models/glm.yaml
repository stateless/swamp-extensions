# GLM family (Zhipu / z.ai). Public + generic.

- id: model-glm-47-flash
  kind: model
  name: GLM-4.7-Flash
  summary: Fast MoE (glm4moelite arch); fast TTFT; cheap via gateways
  visibility: public
  labels: [glm, moe]
  facets:
    architecture:
      hfRepo: zai-org/glm-4.7-flash
      modelType: glm4_moe_lite
      params: "31B"
      activeParams: "3B" # 30B-A3B per model card
      layers: 47
      hidden: 2048
      experts: "4/token of 64 routed + 1 shared"
      nativeContext: 202752 # no rope_scaling — native, not extended
      vocab: 154880
      license: MIT
      modality: [text]
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/zai-org/glm-4.7-flash config.json + model card"
        verification: authoritative
  claims:
    - kind: note
      body: >-
        VERIFIED against HF (2026-06-20): glm4_moe_lite MoE, 31B total / 3B active
        (30B-A3B), 47 layers, 64 routed experts + 1 shared, 4 experts/token,
        202752 native context (rope_scaling null), MIT. Corrects the earlier
        unverified "~14B" estimate.
      provenance:
        asOf: "2026-06-20"
        source: "https://huggingface.co/zai-org/glm-4.7-flash config.json + model card"
        verification: authoritative

# ── access-path: GLM-4.7-Flash AWQ via vLLM on DGX Spark (eugr recipe) ────────
- id: ap-glm-47-flash-spark-vllm-awq
  kind: access-path
  name: GLM-4.7-Flash · vLLM AWQ @ 1× DGX Spark (eugr recipe)
  summary: cyankiwi AWQ 4-bit; solo or cluster; ~40 t/s gen (from recipe comment); 198K context
  visibility: public
  relations:
    - { rel: of-model, target: model-glm-47-flash }
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
    - { rel: uses-technique, target: technique-awq }
  facets:
    recipe:
      download: { hfRepo: cyankiwi/GLM-4.7-Flash-AWQ-4bit, format: safetensors }
      build: { runtime: vLLM, image: "eugr/spark-vllm-docker (local build, tag vllm-node-tf5)" } # build_args: --pre-tf
      artifact: { quant: awq, format: safetensors }
      hardware: { units: 1, accel: GB10 } # tensor_parallel 1; solo allowed (cluster_only false)
      command: |
        vllm serve cyankiwi/GLM-4.7-Flash-AWQ-4bit \
            --tool-call-parser glm47 \
            --reasoning-parser glm45 \
            --enable-auto-tool-choice \
            --served-model-name glm-4.7-flash \
            --max-model-len 202752 \
            --max-num-batched-tokens 4096 \
            --max-num-seqs 64 \
            --gpu-memory-utilization 0.8 \
            -tp 1 \
            --host 0.0.0.0 \
            --port 8000
      serving:
        maxModelLen: 202752
        tensorParallel: 1
        maxNumBatchedTokens: 4096
        maxNumSeqs: 64
        toolCallParser: glm47
        reasoningParser: glm45
      procedure: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/glm-4.7-flash-awq.yaml"
    outcome:
      context: { tokens: 202752 }
      speed:
        genTokS: 40
        note: >-
          from recipe comment ("~40 t/s generation in both single node and
          cluster"), not a benchmark. Recipe warns vLLM is suboptimal for this
          model even with the speed-optimization patch — slower than expected for
          the active-param count; cluster helps prompt processing, not generation.
      provenance:
        asOf: "2026-06-20"
        source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/glm-4.7-flash-awq.yaml"
        verification: cited

# Built 2026-06-19 from authoritative sources as a pipeline test:
#   config.json (architecture) + model card (specs/benchmarks/license) +
#   blog/arXiv (DSA/IndexShare narrative). Honest gaps marked; one benchmark
#   carries a flagged source-variance.
- id: model-glm-52
  kind: model
  name: GLM-5.2
  summary: 753B MoE (glm_moe_dsa); MLA + DSA sparse attention; 1M context; MIT
  visibility: public
  labels: [glm, moe, sparse-attention, long-context, agentic]
  facets:
    architecture:
      modelType: glm_moe_dsa # MLA + DSA sparse-attention indexer (DeepSeek-V3.2 style)
      params: "753B"
      layers: 78
      hidden: 6144
      attentionHeads: 64
      experts: "8/token of 256 routed + 1 shared"
      nativeContext: 1048576 # 1M
      vocab: 154880
      modality: [text]
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2 config.json"
        verification: authoritative
    license:
      spdx: MIT
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
    serving:
      tensorTypes: [BF16, F32]
      frameworks: [SGLang, vLLM, Transformers, KTransformers, "Ascend NPU"]
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
    benchmarks:
      hle: 40.5
      aime2026: 99.2
      sweBenchPro: 62.1
      gpqaDiamond: 91.2
      terminalBench21: 82.7
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/zai-org/GLM-5.2"
        verification: authoritative
        note: >-
          Terminal-Bench 2.1 is 81.0 in the z.ai blog comparison vs 82.7 on the
          model card — source variance flagged, model-card value used.
  claims:
    - kind: note
      body: >-
        IndexShare: the DSA sparse-attention indexer is reused across every four
        sparse-attention layers (index_topk 2048), cutting per-token FLOPs ~2.9×
        at 1M context.
      provenance:
        asOf: "2026-06-19"
        source: "https://huggingface.co/blog/zai-org/glm-52-blog + arXiv 2602.15763"
        verification: cited
    - kind: note
      body: >-
        Active-parameter count is NOT stated for 5.2. The GLM-5 base scales to
        744B total / 40B active — indicative only, not confirmed for 5.2.
      provenance:
        asOf: "2026-06-19"
        source: "arXiv 2602.15763 (GLM-5, not the 5.2 card)"
        verification: cited
    - kind: note
      body: >-
        Release ~2026-02-17 (inferred from arXiv id 2602.15763); not explicitly
        dated on the model card.
      provenance:
        asOf: "2026-06-19"
        source: "arXiv 2602.15763"
        verification: cited

