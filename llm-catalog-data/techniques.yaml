      provenance: { asOf: "2026-06-19", source: "SnapKV / H2O / StreamingLLM", verification: cited }

# PARALLELISM approaches — distribute compute across GPUs/nodes. All LOSSLESS
# (they change WHERE compute runs, never the output). The choice is driven by
# interconnect bandwidth and model size; captured in recipe.serving + referenced.
- id: technique-tensor-parallel
  kind: technique
  name: Tensor parallelism (TP)
  summary: Shard each layer's tensors across GPUs (intra-layer); needs fast interconnect
  visibility: public
  labels: [parallelism, multi-gpu]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        Splits attention/FFN matrices across N GPUs — lowers per-GPU memory and
        speeds compute, but is interconnect-bound (NVLink / RoCE). vLLM
        `--tensor-parallel-size`. The DeepSeek 2-Spark recipe uses TP=2 over
        ConnectX-7. Lossless.
      provenance: { asOf: "2026-06-19", source: "vLLM distributed serving + forum 372268", verification: cited }

- id: technique-pipeline-parallel
  kind: technique
  name: Pipeline parallelism (PP)
  summary: Split model layers across GPUs/nodes (inter-layer); tolerates slower links
  visibility: public
  labels: [parallelism, multi-node]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        Assigns layer ranges to different devices/nodes — far less
        interconnect-sensitive than TP, so it suits slower/multi-node links, at
        some pipeline-bubble latency cost. vLLM `--pipeline-parallel-size`. Lossless.
      provenance: { asOf: "2026-06-19", source: "vLLM distributed serving", verification: cited }

- id: technique-expert-parallel
  kind: technique
  name: Expert parallelism (EP)
  summary: Shard MoE experts across GPUs; pairs with TP for large MoE
  visibility: public
  labels: [parallelism, moe, multi-gpu]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: "Distributes MoE experts across devices (only routed experts compute per token); pairs with TP for large MoE. Lossless."
      provenance: { asOf: "2026-06-19", source: "MoE serving (vLLM/SGLang)", verification: cited }

- id: technique-ray-serve
  kind: technique
  name: Ray / data parallelism
  summary: Replicate the model across nodes for throughput (multi-replica)
  visibility: public
  labels: [parallelism, throughput, ray]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: "Ray-orchestrated multi-replica/multi-node serving for concurrency/throughput (vs TP/PP which split one replica). The AoE Qwen3.5-122B 56 tok/s result used a Ray cluster. Lossless."
      provenance: { asOf: "2026-06-19", source: "Ray Serve / forum 365639", verification: cited }

- id: technique-int8-lmhead
  kind: technique
  name: INT8 LM head (shared-weight Triton GEMV)
  summary: Quantize the LM-head / output projection to INT8 via a shared-weight Triton GEMV kernel
  visibility: public
  labels: [quantization, decode, throughput, triton, int8]
  facets: { qualityImpact: lossy } # INT8 on the output head — small quality risk, decode-throughput win
  claims:
    - kind: finding
      body: >-
        Quantizing the LM head to INT8 lifted Qwen3.5-122B single-Spark decode ~+15%
        (38.4 → 44 tok/s, post 71) atop AutoRound-INT4 + FP8 + MTP. Mechanism:
        runtime per-channel quant (no calibration); a shared-weight Triton GEMV reads
        the weight matrix once per batch, not per token — bandwidth util 24% → 84%.
        The head (248K × 3072 ≈ 729MB BF16) was ~24% of every decode step. v2.4 added
        @triton.autotune over 8 configs for a further +1.2% (post 398).
      provenance:
        asOf: "2026-06-20"
        source: "https://forums.developer.nvidia.com/t/365639 (posts 71, 398)"
        verification: cited

# Context extension — run BEYOND a model's native context via RoPE scaling/YaRN.
- id: technique-context-extension
  kind: technique
  name: Context extension (RoPE scaling / YaRN)
  summary: Run past native context via RoPE-scaling/YaRN; lossy at the extended tail
  visibility: public
  labels: [context, rope, yarn, long-context]
  facets: { qualityImpact: lossy }
  claims:
    - kind: caveat
      body: >-
        Extending past nativeContext (RoPE scaling / YaRN, or vLLM
        `--max-model-len` + `VLLM_ALLOW_LONG_MAX_MODEL_LEN`) trades long-range
        fidelity — quality can degrade at the extended tail ("lost in the
        middle"). NOT all models extend: some hard-cap (Gemma e2b clamps to 128k).
        Verify long-context quality at the target length, don't assume.
      provenance: { asOf: "2026-06-19", source: "RoPE/YaRN + vLLM long-context", verification: cited }
