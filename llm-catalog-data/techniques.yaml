- id: technique-mtp
  kind: technique
  name: Multi-Token Prediction (MTP) speculative decoding
  summary: Model-native MTP draft head for speculative decoding; LOSSLESS (verified accepts)
  visibility: public
  labels: [speculative-decoding, mtp, throughput]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        MTP uses the model's own multi-token-prediction head(s) to draft several
        tokens per step, verified by the base model — accepted tokens are
        identical to standard decoding, so it is lossless (pure throughput win).
        vLLM `--speculative-config '{"method":"mtp","num_speculative_tokens":N}'`.
        Used by the Qwen3.6-NVFP4, Nemotron-3-Ultra and DeepSeek-V4 recipes.
      provenance: { asOf: "2026-06-20", source: "https://github.com/eugr/spark-vllm-docker/tree/main/recipes (mtp recipes)", verification: cited }
    - kind: finding
      body: >-
        Pick N carefully — more tokens is not always faster. On Qwen3.5-122B
        (forum 365639): MTP-1 ≈95% accept (~1.95 tok/step), MTP-2 ≈80% accept and
        the throughput sweet spot. MTP-3 gains single-stream but LOSES −32.9% on
        loaded N=8 concurrency (79.91→60.13 tok/s) and regresses past N≈3-5 — pin
        MTP-2 (posts 71, 435). DGX (bandwidth-bound) prefers lower N than RTX (post 26).
      provenance: { asOf: "2026-06-20", source: "https://forums.developer.nvidia.com/t/365639 (posts 71, 435, 26)", verification: cited }

- id: technique-dflash
  kind: technique
  name: DFlash speculative decoding
  summary: Separate DFlash draft model for speculative decoding (Qwen3.6); LOSSLESS
  visibility: public
  labels: [speculative-decoding, dflash, throughput]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        DFlash uses a separate small draft model (z-lab/Qwen3.6-35B-A3B-DFlash)
        to speculate tokens that the base model verifies — lossless, a throughput
        win. vLLM `--speculative-config '{"method":"dflash","model":...,"num_speculative_tokens":15}'`.
        Used by the Qwen3.6-35B-A3B-FP8 dflash recipe.
      provenance: { asOf: "2026-06-20", source: "https://github.com/eugr/spark-vllm-docker/blob/main/recipes/qwen3.6-35b-a3b-fp8-dflash.yaml", verification: cited }
    - kind: caveat
      body: >-
        DFlash vs MTP for AGENTS at long context — prefer MTP. DFlash "eats memory
        like crazy"; MTP saves ~2.5–3× KV on a 256K window, and the throughput
        difference between DFlash and MTP at medium/high context is too small to
        justify it — "if you work with them [high contexts] most of the time, use
        MTP." DFlash's edge is on FRESH / short-context, high-acceptance bursts (cf.
        the Qwen3.5-122B DFlash agent-burst recipe, forum 374328, ~80 tok/s on
        tool-heavy traffic). prefix-caching also favours MTP — DFlash often needs APC
        OFF (Qwen3.5-122B recipe), which collides with the cache-read-heavy agent
        workload (decision f3b9a4). So: DFlash for short-burst agentic; MTP for
        sustained long-context.
      provenance:
        asOf: "2026-06-26"
        source: "https://forums.developer.nvidia.com/t/whats-the-best-speed-we-can-get-with-qwen-3-6-27b-without-quantizing/367561 post 32 (ajvazan)"
        verification: cited
        confidence: medium

# KV-cache / attention OPTIMISATIONS. The decisive axis is qualityImpact:
#   neutral = mathematically exact (pure speed/memory win — never changes output)
#   lossy   = trades context fidelity for memory (a config-QUALITY factor, §14)
- id: technique-pagedattention
  kind: technique
  name: PagedAttention
  summary: KV-cache memory paging (vLLM) — eliminates fragmentation; LOSSLESS
  visibility: public
  labels: [kv-cache, memory, vllm]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        Virtual-memory-style paging of the KV cache: near-zero fragmentation,
        enables high concurrency + long context in less memory. Mathematically
        exact — pure throughput/memory win, no quality change. vLLM core.
      provenance: { asOf: "2026-06-19", source: "PagedAttention / vLLM", verification: cited }

- id: technique-flashattention
  kind: technique
  name: FlashAttention / FlashInfer
  summary: Fused exact attention kernel — faster + lower memory; LOSSLESS
  visibility: public
  labels: [attention, kernel, memory]
  facets: { qualityImpact: neutral }
  claims:
    - kind: note
      body: >-
        IO-aware fused attention (FlashAttention-2/3, FlashInfer) — cuts attention
        memory and speeds prefill/decode; mathematically EXACT (no quality change).
        The DeepSeek-v4-Flash recipe enables FlashInfer autotune.
      provenance: { asOf: "2026-06-19", source: "FlashAttention / FlashInfer", verification: cited }

- id: technique-prefix-caching
  kind: technique
  name: Prefix caching
  summary: Reuse KV for shared prompt prefixes (system/few-shot); LOSSLESS
