# Techniques — KV-compression, quant schemes, attention/decoding methods.
# Shared reference entities, referenced by id (uses-technique: technique-…). Public.

- id: technique-kv-quant-bf16
  kind: technique
  name: KV-cache quant (bf16)
  summary: Lower KV memory / fix gibberish via --cache-type-k/v bf16 (llama.cpp)
  visibility: public
  labels: [kv-cache, memory]
  facets: { qualityImpact: lossy }
  claims:
    - kind: finding
      body: >-
        Gibberish output at low context or large KV — try `--cache-type-k bf16
        --cache-type-v bf16`.
      provenance:
        asOf: "2026-04-17"
        source: "llama.cpp serving (observed on qwen3.5)"
        confidence: medium

# ── quantization schemes (referenced by access-paths via uses-technique; the
#    chosen scheme + packager also ride the recipe.artifact). A quant is NOT a
#    model — it's how the SAME weights are encoded for deployment. ───────────
- id: technique-gguf-kquant
  kind: technique
  name: GGUF k-quant
  summary: Standard llama.cpp k-quant GGUF compression (Q4_K_M, Q5_K_M, Q8_0, …)
  visibility: public
  labels: [quantization, gguf]
  facets: { qualityImpact: lossy }
  claims:
    - kind: note
      body: >-
        Perplexity / KLD (calibrated on wiki text) is NOT a reliable proxy for
        chat or code quality — a quant that scores well on PPL can produce worse
        outputs. Prefer task-based evals over published PPL.
      provenance:
        asOf: "2026-06-19"
        source: "Unsloth GGUF analysis (via MODEL qwen35 card)"
        verification: cited

- id: technique-unsloth-dynamic
  kind: technique
  name: Unsloth Dynamic GGUF (UD-Q*)
  summary: Per-tensor dynamic bit allocation protecting sensitive tensors; imatrix
  visibility: public
  labels: [quantization, gguf, unsloth, packager]
  claims:
    - kind: finding
      body: >-
        UD-Q4_K_XL / UD-Q4_K_M protect quant-sensitive tensors (keep them at
        higher bit depth) while letting tolerant tensors go lower — better
        quality than flat k-quant at the same nominal bit depth. imatrix variants
        ~5–10% slower but higher quality at a given bit depth (worth it for
        long-context / precise tasks). MXFP4 retired from the Dynamic lineup
        (worse than Q4_K on many tensors; native-hardware only).
      provenance:
        asOf: "2026-06-19"
        source: "Unsloth GGUF analysis (via MODEL qwen35 card)"
        verification: cited

# Quant METHODS (algorithms) — distinct from the FORMAT (gguf/safetensors/mlx).
# Each method usually ships in a specific format and is supported by specific
# runtimes; recipes reference them via `uses-technique`. NOTE: GGUF is a format,
# not a method — its method is GGUF k-quant (technique-gguf-kquant above).
- id: technique-gptq
  kind: technique
  name: GPTQ
  summary: Calibration-based post-training weight quant (INT4/INT3); safetensors
  visibility: public
  labels: [quantization, ptq, safetensors]
  claims:
    - kind: note
      body: >-
        Layer-wise calibration PTQ, commonly INT4. Ships in safetensors; loaded by
        vLLM / transformers / SGLang (NOT llama.cpp). Mature; AWQ often edges it on
        4-bit quality.
      provenance: { asOf: "2026-06-19", source: "GPTQ method / vLLM quantization docs", verification: cited }

- id: technique-awq
  kind: technique
  name: AWQ
  summary: Activation-aware weight quant — protects salient weights; safetensors
  visibility: public
  labels: [quantization, ptq, safetensors]
  claims:
    - kind: note
      body: >-
        Activation-aware Weight Quantization: scales/protects the most salient
        weight channels, typically beating GPTQ at 4-bit quality. safetensors;
        vLLM / transformers / SGLang.
      provenance: { asOf: "2026-06-19", source: "AWQ method / vLLM quantization docs", verification: cited }

