- id: technique-mxfp4
  kind: technique
  name: MXFP4 (microscaling 4-bit float)
  summary: OCP microscaling 4-bit float weight quant; native on Blackwell; safetensors
  visibility: public
  labels: [quantization, fp4, mxfp4, safetensors]
  facets: { qualityImpact: lossy }
