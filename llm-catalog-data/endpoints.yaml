# Endpoints — the reusable HTTP inference interface (the `endpoint` kind).
# Factors out the runtime × hardware × provider surface that access-paths used to
# repeat. Self-host endpoints serve "anything that fits the hardware" (computed);
# gateway endpoints serve a listed set (their priced access-paths). See
# docs/decisions/2026-06-22-e1d4a9-llm-catalog-endpoint-model.md.

# ── self-host: vLLM (via the spark-vllm-docker distribution) on a DGX Spark ───
- id: endpoint-vllm-dgx-spark
  kind: endpoint
  name: vLLM @ DGX Spark
  summary: OpenAI-compatible vLLM server on a GB10 Spark (spark-vllm-docker distribution); serves anything that fits unified memory
  visibility: public
  labels: [self-host, vllm, dgx-spark, cuda]
  relations:
    - { rel: served-by, target: runtime-vllm }
    - { rel: built-with, target: runtime-spark-vllm-docker }
    - { rel: runs-on, target: hardware-dgx-spark }
  facets:
    endpoint: { transport: openai-compat, kind: self-host }
    pricing: { basis: owned-amortized, note: "owned GB10; opex ≈ power (~70W/unit)" }
    serves: { rule: fits-hardware, note: "models computed from footprint vs (unifiedMemGB − driverReservedGB) × units; measured recipes attach as via-endpoint access-paths" }

# ── self-host: llama.cpp (host-agnostic local GGUF) ──────────────────────────
- id: endpoint-llamacpp
  kind: endpoint
  name: llama.cpp (local GGUF)
  summary: llama-server OpenAI-compatible endpoint; host-agnostic — runs GGUF on whatever host capacity is asked about
  visibility: public
  labels: [self-host, llama.cpp, gguf]
  relations:
    - { rel: served-by, target: runtime-llamacpp }
  facets:
    endpoint: { transport: openai-compat, kind: self-host }
    pricing: { basis: owned-amortized }
    serves: { rule: fits-hardware, note: "no fixed hardware — fit is computed against the caller's host; GGUF artifacts" }

# ── self-host: DwarfStar (ds4) on Apple Silicon ──────────────────────────────
- id: endpoint-ds4-mac
  kind: endpoint
  name: DwarfStar @ Apple Silicon
  summary: ds4 (DwarfStar) inference on Apple-silicon unified memory; custom GGUF + agent harness
  visibility: public
  labels: [self-host, dwarfstar, ds4, apple-silicon]
  relations:
    - { rel: served-by, target: runtime-dwarfstar }
    - { rel: runs-on, target: hardware-apple-silicon }
  facets:
    endpoint: { transport: openai-compat, kind: self-host }
    pricing: { basis: owned-amortized }
    serves: { rule: fits-hardware }

# ── self-host: DwarfStar (ds4) on a DGX Spark (CUDA — UNVERIFIED on GB10) ─────
- id: endpoint-ds4-dgx-spark
  kind: endpoint
  name: DwarfStar @ DGX Spark
  summary: ds4 (DwarfStar) on a GB10 Spark; CUDA backend on GB10 is UNVERIFIED (repo Speed table is Mac-only)
  visibility: public
  labels: [self-host, dwarfstar, ds4, dgx-spark, cuda]
  relations:
    - { rel: served-by, target: runtime-dwarfstar }
    - { rel: runs-on, target: hardware-dgx-spark }
  facets:
    endpoint: { transport: openai-compat, kind: self-host }
    pricing: { basis: owned-amortized }
    serves: { rule: fits-hardware }
  claims:
    - kind: caveat
      body: "ds4 CUDA backend on GB10 is UNVERIFIED — confirm it compiles/runs before trusting any -dgx-spark operating point."
